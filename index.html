<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>hosq · curator workspace</title>

<style>
/* ===== HOSQ brand fonts ===== */
@font-face { font-family:"Cera Pro"; src:url("fonts/CeraPro-Regular.woff") format("woff"); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:"Cera Pro"; src:url("fonts/CeraPro-Medium.woff") format("woff"); font-weight:500; font-style:normal; font-display:swap; }
@font-face { font-family:"Cera Pro"; src:url("fonts/CeraPro-Bold.woff") format("woff"); font-weight:700; font-style:normal; font-display:swap; }

/* ===== HOSQ design tokens (UNCHANGED) ===== */
:root {
  --hosq-coral:#FF6F55; --hosq-violet:#C47CF1; --hosq-green:#14B672; --hosq-blue:#56A4CB; --hosq-pink:#E770C3;
  --hosq-dark:#231F20; --hosq-cream:#EBE2D6; --hosq-blush:#E8DCD4; --hosq-paper:#F5EFE7;
  --hosq-ink-2:#6B6566; --hosq-ink-3:#9A9596;
  --hosq-line:rgba(35,31,32,0.10); --hosq-line-2:rgba(35,31,32,0.18);
  --hosq-good:#14B672; --hosq-warn:#E0A23A; --hosq-bad:#D8553F;
  --font-sans:"Cera Pro",-apple-system,"DM Sans",system-ui,sans-serif;
  --topbar-h:48px; --rail-w:56px; --rail-w-open:280px; --right-w:380px;
}

*,*::before,*::after { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family:var(--font-sans); font-weight:400; font-size:15px; line-height:1.6;
  color:var(--hosq-dark); background:var(--hosq-cream);
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; padding:0; }
input,textarea { font-family:inherit; }

/* ===== top bar ===== */
.topbar {
  position:sticky; top:0; z-index:50;
  display:grid; grid-template-columns:auto 1fr auto auto; align-items:center;
  gap:20px; height:var(--topbar-h); padding:0 20px;
  background:var(--hosq-cream); border-bottom:1px solid var(--hosq-line);
}
.brand { font-weight:700; font-size:19px; letter-spacing:-0.01em; color:var(--hosq-dark); text-transform:lowercase; display:flex; align-items:center; gap:10px; }
.brand::after { content:"curator"; font-size:10px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--hosq-ink-2); padding:2px 8px; border:1px solid var(--hosq-line-2); border-radius:999px; }

.tabs { display:flex; align-items:center; gap:4px; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { display:inline-flex; align-items:center; gap:8px; padding:5px 12px; border-radius:999px; font-size:13px; font-weight:500; color:var(--hosq-ink-2); white-space:nowrap; transition:background .15s,color .15s; }
.tab:hover { background:rgba(35,31,32,0.06); color:var(--hosq-dark); }
.tab.is-active { background:var(--hosq-dark); color:var(--hosq-cream); }
.tab .dot { width:6px; height:6px; border-radius:999px; background:var(--hosq-ink-3); }
.tab.is-active .dot { background:var(--hosq-coral); }
.tab .stage-mini { font-size:10px; opacity:0.7; letter-spacing:0.04em; text-transform:uppercase; }
.tab .score-mini { font-size:11px; font-weight:700; font-variant-numeric:tabular-nums; opacity:0.85; }
.tab-close { margin-left:2px; width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; border-radius:999px; opacity:0.5; font-size:14px; line-height:1; }
.tab-close:hover { opacity:1; background:rgba(255,255,255,0.15); }
.tab-add { width:26px; height:26px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-size:17px; color:var(--hosq-ink-2); }
.tab-add:hover { background:rgba(35,31,32,0.06); color:var(--hosq-dark); }

.mode-toggle { display:inline-flex; background:rgba(35,31,32,0.06); border-radius:999px; padding:3px; position:relative; }
.mode-toggle button { padding:5px 14px; font-size:12px; font-weight:600; letter-spacing:0.02em; border-radius:999px; color:var(--hosq-ink-2); position:relative; z-index:1; transition:color .2s; display:inline-flex; align-items:center; gap:6px; }
.mode-toggle button.is-active { color:var(--hosq-cream); }
.mode-toggle .glider { position:absolute; top:3px; bottom:3px; background:var(--hosq-dark); border-radius:999px; transition:left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1); z-index:0; }

.topbar-end { display:flex; align-items:center; gap:10px; }
.icon-btn {
  width:30px; height:30px;
  border-radius:8px;
  display:inline-flex; align-items:center; justify-content:center;
  color:var(--hosq-ink-2);
  transition:background .12s, color .12s;
  position:relative;
}
.icon-btn:hover { background:rgba(35,31,32,0.06); color:var(--hosq-dark); }
.icon-btn.is-active { color:var(--hosq-dark); background:rgba(35,31,32,0.08); }
.icon-btn .badge { position:absolute; top:2px; right:2px; width:6px; height:6px; border-radius:999px; background:var(--hosq-coral); }
.cmdk { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border:1px solid var(--hosq-line-2); border-radius:8px; font-size:12px; color:var(--hosq-ink-2); }
.kbd { font-size:11px; font-weight:500; padding:1px 5px; border-radius:4px; background:rgba(35,31,32,0.08); }
.avatar { width:28px; height:28px; border-radius:999px; background:var(--hosq-violet); color:white; font-weight:700; font-size:12px; display:inline-flex; align-items:center; justify-content:center; }

/* ===== app shell ===== */
.shell { display:grid; grid-template-columns:var(--rail-w) minmax(0,1fr) var(--right-w); min-height:calc(100vh - var(--topbar-h)); transition:grid-template-columns .25s ease; }
body.mode-scoring { --right-w:440px; }
body.outline-pinned { --rail-w:var(--rail-w-open); }
body.view-chat { --rail-w:0px; --right-w:340px; }
body.view-chat .outline { display:none; }

/* ===== stage badge ===== */
.stage-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:3px 10px;
  border-radius:999px;
  background:var(--hosq-paper);
  color:var(--hosq-dark);
  font-size:11px; font-weight:600;
  letter-spacing:0.04em;
  cursor:pointer;
  position:relative;
}
.stage-badge .dot { width:6px; height:6px; border-radius:999px; }
.stage-badge.s-idea       .dot { background:var(--hosq-ink-3); }
.stage-badge.s-brief      .dot { background:var(--hosq-violet); }
.stage-badge.s-concept    .dot { background:var(--hosq-blue); }
.stage-badge.s-production .dot { background:var(--hosq-coral); }
.stage-badge.s-done       .dot { background:var(--hosq-green); }
.stage-badge:hover { background:rgba(35,31,32,0.08); }
.stage-badge .caret { font-size:10px; opacity:0.6; }

.stage-popover {
  position:absolute;
  top:calc(100% + 6px); left:0; z-index:30;
  background:var(--hosq-cream);
  border:1px solid var(--hosq-line-2);
  border-radius:12px;
  padding:6px;
  min-width:220px;
  display:none;
}
.stage-popover.is-open { display:block; }
.stage-popover button {
  width:100%;
  display:flex; align-items:center; gap:10px;
  padding:8px 10px;
  border-radius:8px;
  text-align:left;
  font-size:13px;
}
.stage-popover button:hover { background:var(--hosq-paper); }
.stage-popover button .dot { width:8px; height:8px; border-radius:999px; }
.stage-popover button .meta { margin-left:auto; font-size:11px; color:var(--hosq-ink-2); }

/* ===== left outline ===== */
.outline { position:sticky; top:var(--topbar-h); align-self:start; height:calc(100vh - var(--topbar-h)); overflow:visible; z-index:10; }
.outline-inner {
  position:relative; width:var(--rail-w); height:100%;
  background:var(--hosq-cream);
  padding:16px 8px 24px;
  overflow-y:auto; overflow-x:hidden;
  transition:width .22s ease, padding .22s ease;
  border-right:1px solid transparent;
}
.outline:hover .outline-inner,
body.outline-pinned .outline-inner { width:var(--rail-w-open); padding:16px 14px 24px; border-right-color:var(--hosq-line); }

.rail-pin { width:100%; display:flex; align-items:center; justify-content:center; height:28px; border-radius:6px; margin-bottom:6px; color:var(--hosq-ink-3); transition:color .12s,background .12s; }
.rail-pin:hover { color:var(--hosq-dark); background:rgba(35,31,32,0.05); }
body.outline-pinned .rail-pin { color:var(--hosq-coral); }
.rail-pin .label-pin { display:none; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-left:8px; }
.outline:hover .rail-pin .label-pin, body.outline-pinned .rail-pin .label-pin { display:inline; }

.outline-list { display:flex; flex-direction:column; gap:0; }
.outline-row { display:grid; grid-template-columns:24px 1fr 14px; align-items:center; padding:8px 6px; border-radius:8px; text-align:left; width:100%; transition:background .12s,gap .15s,padding .15s; color:var(--hosq-dark); position:relative; }
.outline-row:hover { background:rgba(35,31,32,0.05); }
.outline-row.is-active { background:rgba(35,31,32,0.10); }
.outline-row .num { font-size:10px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--hosq-ink-2); text-align:center; opacity:0; transition:opacity .15s; }
.outline-row .label { font-size:13px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0; transition:opacity .15s; padding-left:10px; }
.outline:hover .outline-row .num, body.outline-pinned .outline-row .num,
.outline:hover .outline-row .label, body.outline-pinned .outline-row .label { opacity:1; }
.outline-row.is-active .label { font-weight:500; }
.outline-row .state-cell { display:flex; align-items:center; justify-content:center; width:14px; height:14px; margin-left:auto; }

.dot-state { width:8px; height:8px; border-radius:999px; flex-shrink:0; }
.dot-state.full { background:var(--hosq-dark); }
.dot-state.partial { background:transparent; border:2px solid var(--hosq-dark); }
.dot-state.empty { background:transparent; border:1.5px solid var(--hosq-line-2); }

.bar-state { width:28px; height:4px; border-radius:999px; background:var(--hosq-line); overflow:hidden; flex-shrink:0; transition:width .2s; }
.outline-row .state-cell .bar-state { width:8px; height:8px; border-radius:999px; background:var(--hosq-line); }
.outline:hover .outline-row .state-cell .bar-state, body.outline-pinned .outline-row .state-cell .bar-state { width:28px; height:4px; }
.bar-state .fill { display:block; height:100%; border-radius:999px; }

.outline-foot { margin-top:18px; padding:12px 6px 0; border-top:1px solid var(--hosq-line); font-size:11px; color:var(--hosq-ink-2); display:none; }
.outline:hover .outline-foot, body.outline-pinned .outline-foot { display:block; }
.outline-foot .progress-num { font-size:18px; font-weight:700; color:var(--hosq-dark); font-variant-numeric:tabular-nums; display:block; margin-bottom:4px; }
.outline-foot .progress-bar { height:3px; background:var(--hosq-line); border-radius:999px; overflow:hidden; margin-top:6px; }
.outline-foot .progress-bar .fill { display:block; height:100%; background:var(--hosq-dark); border-radius:999px; transition:width .4s; }

/* ===== center document ===== */
.doc { padding:56px 96px 160px; max-width:880px; margin:0 auto; width:100%; }
.doc-header { margin-bottom:24px; }
.doc-eyebrow { display:flex; align-items:center; gap:10px; margin-bottom:14px; font-size:10px; font-weight:600; letter-spacing:0.10em; text-transform:uppercase; color:var(--hosq-ink-2); }
.doc-title { font-weight:700; font-size:46px; line-height:1.05; letter-spacing:-0.02em; margin:0 0 10px; }
.doc-subtitle { font-size:16px; color:var(--hosq-ink-2); margin:0; }

.phase { margin-top:96px; scroll-margin-top:80px; }
.phase:first-of-type { margin-top:56px; }
.phase-head { margin-bottom:18px; }
.phase-eyebrow { display:inline-flex; align-items:center; gap:8px; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--hosq-ink-2); margin-bottom:8px; }
.phase-eyebrow .auto-tag { padding:1px 6px; border-radius:999px; background:var(--hosq-paper); color:var(--hosq-ink-2); font-weight:500; letter-spacing:0.04em; }
.phase-eyebrow .stage-skip {
  padding:1px 6px; border-radius:999px;
  background:rgba(196,124,241,0.16);
  color:#6e2da7;
  font-weight:600; letter-spacing:0.04em;
}
.phase-title { font-size:28px; font-weight:700; letter-spacing:-0.015em; margin:0; }

.specimen { margin:14px 0 8px; display:flex; flex-wrap:wrap; align-items:center; gap:4px 12px; font-size:14px; line-height:1.65; color:var(--hosq-dark); }
.specimen .fact { position:relative; display:inline-flex; align-items:center; gap:6px; }
.specimen .dot-sep { color:var(--hosq-ink-3); user-select:none; font-weight:400; }
.specimen .inline-edit { outline:none; padding:1px 4px; margin:-1px -4px; border-radius:4px; transition:background .12s; }
.specimen .inline-edit:hover { background:rgba(35,31,32,0.04); }
.specimen .inline-edit:focus { background:var(--hosq-paper); }
.specimen .inline-edit.muted { color:var(--hosq-ink-3); }
.specimen .fact[data-label]:hover::before {
  content:attr(data-label);
  position:absolute; bottom:calc(100% + 4px); left:0;
  font-size:9px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--hosq-ink-2); white-space:nowrap;
  background:var(--hosq-paper); padding:2px 6px; border-radius:4px;
  pointer-events:none; z-index:5;
}
.phase.auto .specimen { font-size:12px; color:var(--hosq-ink-2); }
.phase.auto .phase-title { font-size:18px; color:var(--hosq-ink-2); font-weight:500; }

.phase-body { margin-top:8px; }
.prose-block { position:relative; padding-top:24px; margin-bottom:18px; }
.prose-caption {
  position:absolute; top:4px; left:0; right:0;
  display:flex; align-items:center; gap:10px;
  font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--hosq-ink-2);
  opacity:0.32;
  transition:opacity .15s;
  pointer-events:none;
}
.prose-block:hover .prose-caption, .prose-block:focus-within .prose-caption { opacity:1; pointer-events:auto; }
.prose-caption .req-dot { width:5px; height:5px; border-radius:999px; background:var(--hosq-coral); display:inline-block; opacity:0; transition:opacity .15s; }
.prose-block.is-empty:focus-within .prose-caption .req-dot { opacity:1; }
.prose-caption .metric-tag { display:inline-flex; padding:1px 5px; border-radius:4px; background:rgba(35,31,32,0.06); font-weight:600; letter-spacing:0.04em; color:var(--hosq-ink-2); font-variant-numeric:tabular-nums; }
.prose-caption .auto-pill {
  padding:1px 6px; border-radius:999px;
  background:rgba(196,124,241,0.18);
  color:#6e2da7;
  font-weight:700; letter-spacing:0.06em;
}
.prose-caption .challenge-btn {
  margin-left:auto;
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:999px;
  background:var(--hosq-paper);
  font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--hosq-ink-2);
  pointer-events:auto;
  transition:background .12s, color .12s;
}
.prose-caption .challenge-btn:hover { background:var(--hosq-dark); color:var(--hosq-cream); }
.prose-caption .challenge-btn svg { width:9px; height:9px; }

.prose-block.is-auto .editable.para { color:var(--hosq-ink-2); }
.prose-block.is-auto .editable.para::after {
  content:""; /* will be styled via wrapper */
}
.prose-block.is-auto .auto-customize {
  display:inline-block;
  margin-top:6px;
  font-size:11px; font-weight:600;
  color:var(--hosq-violet);
  text-decoration:underline;
  text-underline-offset:3px;
  cursor:pointer;
}
.prose-block.is-customized .auto-pill {
  background:rgba(20,182,114,0.18);
  color:#0a6b41;
}
.prose-block.is-customized .auto-pill::before { content:"✓ "; }

.prose-block .editable.para {
  font-size:16px; line-height:1.7;
  margin:0 0 10px;
  padding:4px 6px;
  border-radius:6px;
  outline:none;
  transition:background .12s, box-shadow .12s;
  cursor:text;
}
.prose-block .editable.para:last-child { margin-bottom:0; }
.prose-block .editable.para:hover { background:rgba(35,31,32,0.025); }
.prose-block .editable.para:focus { background:var(--hosq-paper); box-shadow:inset 0 0 0 1px var(--hosq-line); }
.prose-block .editable.para.is-selected { background:rgba(255,111,85,0.08); box-shadow:inset 0 0 0 1px rgba(255,111,85,0.30); }
.prose-block .editable.para.is-related { background:rgba(196,124,241,0.10); box-shadow:inset 0 0 0 1px rgba(196,124,241,0.28); }

/* inline AI critique panel */
.critique {
  margin:8px 0 4px;
  padding:14px 16px;
  background:var(--hosq-paper);
  border-left:3px solid var(--hosq-violet);
  border-radius:6px;
  font-size:14px;
  line-height:1.6;
  color:var(--hosq-dark);
}
.critique-head {
  display:flex; align-items:center; gap:8px;
  font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--hosq-ink-2);
  margin-bottom:8px;
}
.critique-head .dot { width:6px; height:6px; border-radius:999px; background:var(--hosq-violet); }
.critique p { margin:0 0 8px; }
.critique p:last-child { margin-bottom:0; }
.critique-actions { display:flex; gap:6px; margin-top:10px; }
.critique-actions button {
  padding:5px 12px; border-radius:999px;
  font-size:11px; font-weight:600; letter-spacing:0.04em;
}
.critique-actions .accept { background:var(--hosq-dark); color:var(--hosq-cream); }
.critique-actions .dismiss { background:transparent; color:var(--hosq-ink-2); }
.critique-actions .dismiss:hover { color:var(--hosq-dark); }
.critique-actions .ask-expert {
  background:rgba(86,164,203,0.18); color:#2c627c;
}

.placeholder-prose {
  position:relative; font-style:italic; color:var(--hosq-ink-3);
  margin:6px 0 18px; padding:4px 6px 4px 18px; font-size:15px; line-height:1.65;
  cursor:text; border-radius:6px; transition:color .12s, background .12s;
}
.placeholder-prose::before { content:"…"; position:absolute; left:4px; color:var(--hosq-ink-3); font-style:normal; font-weight:600; }
.placeholder-prose:hover { color:var(--hosq-ink-2); background:rgba(35,31,32,0.025); }
.placeholder-prose .ph-label { font-style:normal; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--hosq-ink-3); margin-right:8px; font-weight:600; }

.chip { display:inline-flex; align-items:center; padding:2px 9px; border-radius:999px; background:var(--hosq-paper); font-size:12px; font-weight:500; line-height:1.4; }
.chip.coral  { background:rgba(255,111,85,0.16); color:#8a2e1c; }
.chip.green  { background:rgba(20,182,114,0.16); color:#0a6b41; }
.chip.violet { background:rgba(196,124,241,0.16); color:#6e2da7; }
.chip.blue   { background:rgba(86,164,203,0.18); color:#2c627c; }
.chip.dark   { background:var(--hosq-dark); color:var(--hosq-cream); }
.chip-row { display:inline-flex; flex-wrap:wrap; gap:4px; }

/* ===== right AI panel ===== */
.ai { position:sticky; top:var(--topbar-h); align-self:start; height:calc(100vh - var(--topbar-h)); overflow-y:auto; padding:28px 28px 40px 32px; background:var(--hosq-cream); }
.ai-eyebrow { display:flex; align-items:center; justify-content:space-between; font-size:10px; font-weight:600; letter-spacing:0.10em; text-transform:uppercase; color:var(--hosq-ink-2); margin-bottom:14px; }
.ai-eyebrow .mode-pill { padding:2px 8px; border-radius:999px; background:var(--hosq-dark); color:var(--hosq-cream); }

.score-block { background:var(--hosq-paper); border-radius:16px; padding:18px; margin-bottom:18px; }
.score-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:10px; }
.score-cell .lbl { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--hosq-ink-2); margin-bottom:2px; display:block; }
.score-cell .val { font-size:36px; font-weight:700; line-height:1; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
.score-cell .val .of { font-size:14px; color:var(--hosq-ink-2); font-weight:500; }
.score-cell .delta { font-size:11px; font-weight:600; padding:2px 7px; border-radius:999px; margin-left:6px; vertical-align:middle; }
.score-cell .delta.up { background:rgba(20,182,114,0.18); color:#0a6b41; }
.score-cell .delta.down { background:rgba(216,85,63,0.16); color:#8a2e1c; }
.score-cell .delta.flat { background:rgba(35,31,32,0.08); color:var(--hosq-ink-2); }

.score-stage-note {
  font-size:11px; line-height:1.5; color:var(--hosq-ink-2);
  padding:8px 10px; border-radius:8px;
  background:var(--hosq-cream); margin-bottom:10px;
}
.score-stage-note strong { color:var(--hosq-dark); font-weight:600; }

.spark {
  display:flex; align-items:end; gap:5px;
  height:34px; margin-bottom:12px;
}
.spark-col {
  display:flex; flex-direction:column; align-items:center;
  flex:1;
  font-size:10px; color:var(--hosq-ink-3);
  font-variant-numeric:tabular-nums;
}
.spark-col .bar {
  width:100%; max-width:18px;
  background:var(--hosq-line);
  border-radius:3px;
  margin-bottom:3px;
}
.spark-col.is-current .bar { background:var(--hosq-dark); }
.spark-col.is-current { color:var(--hosq-dark); font-weight:600; }

.score-meta { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--hosq-ink-2); margin-bottom:12px; }
.score-meta .stale-dot { width:7px; height:7px; border-radius:999px; background:var(--hosq-ink-3); }
.score-meta.is-stale .stale-dot { background:var(--hosq-warn); }
.score-meta.is-stale strong { color:var(--hosq-dark); }

.score-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:11px 16px; background:var(--hosq-dark); color:var(--hosq-cream); border-radius:999px; font-size:13px; font-weight:600; letter-spacing:0.02em; transition:opacity .15s, transform .1s; }
.score-btn:hover { opacity:0.92; }
.score-btn:active { transform:translateY(1px); }
.score-btn[disabled] { opacity:0.45; cursor:not-allowed; }
.score-btn.is-cooling { background:var(--hosq-paper); color:var(--hosq-ink-2); border:1px dashed var(--hosq-line-2); }
.score-btn .recommend { font-size:11px; font-weight:500; opacity:0.75; }

.weak-list { display:flex; flex-direction:column; gap:2px; margin-bottom:12px; }
.weak-item { display:grid; grid-template-columns:28px 1fr auto; gap:10px; align-items:center; padding:10px 12px; border-radius:12px; text-align:left; width:100%; transition:background .12s; }
.weak-item:hover, .weak-item.is-active { background:var(--hosq-paper); }
.weak-item .vcode { font-size:11px; font-weight:700; color:var(--hosq-ink-2); font-variant-numeric:tabular-nums; letter-spacing:0.04em; }
.weak-item .vname { font-size:13px; font-weight:500; color:var(--hosq-dark); }
.weak-item .vname .sub { display:block; font-size:11px; color:var(--hosq-ink-2); font-weight:400; margin-top:2px; }
.weak-item .vscore { font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--hosq-bad); }

.see-all { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--hosq-ink-2); padding:4px 0; }
.see-all:hover { color:var(--hosq-dark); }

.weak-stage-hidden {
  font-size:11px; color:var(--hosq-ink-2);
  padding:8px 10px; margin-top:6px;
  border-radius:8px;
  background:rgba(196,124,241,0.10);
  border:1px dashed rgba(196,124,241,0.35);
}

.coach { margin-top:22px; padding:16px; background:var(--hosq-paper); border-radius:16px; }
.coach-head { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--hosq-ink-2); margin-bottom:8px; }
.coach-target { font-size:14px; font-weight:500; margin-bottom:4px; }
.coach-meta { font-size:12px; color:var(--hosq-ink-2); margin-bottom:12px; }
.coach-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
.coach-cta { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:var(--hosq-dark); color:var(--hosq-cream); border-radius:999px; font-size:12px; font-weight:600; }
.coach-cta .cost { font-size:10px; opacity:0.65; font-weight:500; }
.coach-empty { font-size:13px; color:var(--hosq-ink-2); line-height:1.55; }
.coach-empty strong { color:var(--hosq-dark); font-weight:500; }
.metric-tag { display:inline-flex; padding:1px 5px; border-radius:4px; background:rgba(35,31,32,0.06); font-weight:600; letter-spacing:0.04em; color:var(--hosq-ink-2); font-variant-numeric:tabular-nums; font-size:10px; }

/* scoring vector list */
.vec-list { display:flex; flex-direction:column; gap:1px; background:var(--hosq-line); border-radius:16px; overflow:hidden; }
.vec-item { display:block; width:100%; text-align:left; background:var(--hosq-cream); padding:12px 14px; transition:background .12s; }
.vec-item:hover, .vec-item.is-expanded { background:var(--hosq-paper); }
.vec-item.is-skip { opacity:0.55; }
.vec-item-row { display:grid; grid-template-columns:22px 1fr auto; gap:12px; align-items:center; }
.vec-code { font-size:13px; font-weight:700; color:var(--hosq-ink-2); font-variant-numeric:tabular-nums; }
.vec-name { font-size:13px; font-weight:500; }
.vec-name .skip-tag {
  margin-left:6px;
  font-size:9px; font-weight:700; letter-spacing:0.06em;
  padding:1px 5px; border-radius:999px;
  background:rgba(196,124,241,0.18); color:#6e2da7;
}
.vec-score { display:flex; align-items:center; gap:10px; }
.vec-score .num { font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; min-width:28px; text-align:right; }
.vec-score-bar { width:56px; height:4px; background:var(--hosq-line); border-radius:999px; overflow:hidden; }
.vec-score-bar .fill { display:block; height:100%; border-radius:999px; }
.q-bad { background:var(--hosq-bad); } .q-warn { background:var(--hosq-warn); } .q-ok { background:var(--hosq-blue); } .q-good { background:var(--hosq-good); }
.t-bad { color:var(--hosq-bad); } .t-warn { color:var(--hosq-warn); } .t-ok { color:var(--hosq-dark); } .t-good { color:var(--hosq-good); }

.is-stale .vec-score .num, .is-stale .score-cell .val { color:var(--hosq-ink-3); }
.is-stale .vec-score-bar .fill { opacity:0.5; }

.subs { margin-top:10px; padding-top:10px; border-top:1px solid var(--hosq-line); display:none; }
.vec-item.is-expanded .subs { display:block; }
.sub-row { display:grid; grid-template-columns:32px 1fr auto; gap:10px; align-items:center; padding:5px 0; font-size:12px; }
.sub-code { color:var(--hosq-ink-2); font-weight:600; font-variant-numeric:tabular-nums; }
.sub-name { color:var(--hosq-dark); }
.sub-score { font-weight:700; font-variant-numeric:tabular-nums; }
.sub-narrative { margin-top:8px; padding:10px 12px; background:var(--hosq-cream); border-radius:8px; font-size:12px; color:var(--hosq-ink-2); line-height:1.55; }
.sub-jump { display:inline-flex; align-items:center; gap:4px; margin-top:6px; font-size:11px; font-weight:600; color:var(--hosq-dark); text-decoration:underline; text-underline-offset:3px; }

/* ============================================================
   BRIEF BUILDER (Screen 0) — chat layout
   ============================================================ */
.chat {
  padding:32px 56px 24px;
  max-width:880px;
  margin:0 auto;
  width:100%;
  display:flex; flex-direction:column;
  height:calc(100vh - var(--topbar-h));
}
.chat-header { margin-bottom:20px; flex-shrink:0; }
.chat-header h1 { font-size:30px; font-weight:700; letter-spacing:-0.015em; margin:0 0 6px; }
.chat-header .sub { font-size:14px; color:var(--hosq-ink-2); margin:0; }
.chat-mode-row {
  display:flex; align-items:center; gap:8px;
  margin-top:14px;
}
.chat-mode-pill {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 12px; border-radius:999px;
  background:var(--hosq-paper);
  font-size:11px; font-weight:600; letter-spacing:0.04em;
  color:var(--hosq-dark);
}
.chat-mode-pill .dot { width:6px; height:6px; border-radius:999px; background:var(--hosq-violet); }
.chat-mode-pill.is-harder .dot { background:var(--hosq-coral); }

.chat-stream {
  flex:1;
  overflow-y:auto;
  display:flex; flex-direction:column; gap:14px;
  padding:8px 4px 16px;
  scroll-behavior:smooth;
}
.msg { display:flex; gap:10px; max-width:88%; }
.msg.from-ai { align-self:flex-start; }
.msg.from-user { align-self:flex-end; flex-direction:row-reverse; }
.msg .msg-avatar {
  width:24px; height:24px;
  border-radius:999px;
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
}
.msg.from-ai .msg-avatar { background:var(--hosq-dark); color:var(--hosq-cream); }
.msg.from-user .msg-avatar { background:var(--hosq-violet); color:white; }
.msg-body {
  padding:10px 14px;
  border-radius:16px;
  font-size:15px; line-height:1.55;
}
.msg.from-ai .msg-body {
  background:var(--hosq-paper);
  border-top-left-radius:4px;
}
.msg.from-user .msg-body {
  background:var(--hosq-dark);
  color:var(--hosq-cream);
  border-top-right-radius:4px;
}
.msg-eyebrow {
  font-size:9px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--hosq-ink-2);
  margin-bottom:4px;
}
.msg.from-user .msg-eyebrow { display:none; }
.msg-body p { margin:0 0 8px; }
.msg-body p:last-child { margin-bottom:0; }
.msg-body ol, .msg-body ul { margin:6px 0; padding-left:20px; }
.msg-body li { margin-bottom:4px; }

.chat-input-wrap {
  flex-shrink:0;
  margin-top:auto;
  padding-top:14px;
  border-top:1px solid var(--hosq-line);
}
.chat-input-tools {
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px;
  font-size:11px; color:var(--hosq-ink-2);
}
.chat-input-tools button {
  padding:4px 10px; border-radius:999px;
  background:var(--hosq-paper);
  font-size:11px; font-weight:600; letter-spacing:0.04em;
  color:var(--hosq-ink-2);
  display:inline-flex; align-items:center; gap:5px;
  transition:background .12s, color .12s;
}
.chat-input-tools button:hover { background:rgba(35,31,32,0.10); color:var(--hosq-dark); }
.chat-input-tools button.is-on { background:var(--hosq-coral); color:white; }
.chat-input-tools .stat { margin-left:auto; }

.chat-input {
  display:flex; gap:8px;
  align-items:flex-end;
}
.chat-textarea {
  flex:1;
  min-height:46px; max-height:160px;
  padding:12px 14px;
  border:1px solid var(--hosq-line-2);
  border-radius:16px;
  font-size:15px; line-height:1.5;
  background:var(--hosq-cream);
  resize:vertical;
  outline:none;
  transition:border-color .12s, box-shadow .12s;
}
.chat-textarea:focus { border-color:var(--hosq-dark); box-shadow:0 0 0 3px rgba(35,31,32,0.06); }
.chat-send {
  padding:12px 18px;
  background:var(--hosq-dark); color:var(--hosq-cream);
  border-radius:14px;
  font-size:13px; font-weight:600; letter-spacing:0.02em;
  display:inline-flex; align-items:center; gap:6px;
}
.chat-send:hover { opacity:0.92; }

/* brief session info (right panel during chat) */
.session-pane { /* uses .ai shell already */ }
.session-progress {
  margin-bottom:18px;
  padding:14px;
  background:var(--hosq-paper);
  border-radius:14px;
}
.session-progress-num { font-size:28px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }
.session-progress-num .of { font-size:14px; color:var(--hosq-ink-2); font-weight:500; }
.session-progress-meta { font-size:11px; color:var(--hosq-ink-2); margin-top:2px; }
.session-progress-bar { height:4px; background:var(--hosq-line); border-radius:999px; overflow:hidden; margin-top:10px; }
.session-progress-bar .fill { display:block; height:100%; background:var(--hosq-dark); border-radius:999px; transition:width .4s; }

.themes-list { display:flex; flex-direction:column; gap:1px; background:var(--hosq-line); border-radius:14px; overflow:hidden; margin-bottom:16px; }
.theme-row {
  display:grid; grid-template-columns:14px 1fr auto;
  gap:10px; align-items:center;
  padding:9px 12px;
  background:var(--hosq-cream);
  font-size:12px;
}
.theme-row .ck {
  width:14px; height:14px; border-radius:999px;
  border:1.5px solid var(--hosq-line-2);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; color:white;
}
.theme-row.is-done .ck { background:var(--hosq-green); border-color:var(--hosq-green); }
.theme-row.is-done .ck::before { content:"✓"; }
.theme-row .name { color:var(--hosq-dark); }
.theme-row.is-pending .name { color:var(--hosq-ink-2); }
.theme-row .qcount { font-size:10px; color:var(--hosq-ink-3); }

.session-cta {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%;
  padding:12px 16px;
  background:var(--hosq-coral); color:white;
  border-radius:999px;
  font-size:13px; font-weight:600; letter-spacing:0.02em;
  margin-bottom:8px;
}
.session-cta:hover { filter:brightness(1.05); }
.session-cta[disabled] { background:var(--hosq-paper); color:var(--hosq-ink-2); cursor:not-allowed; }

.session-secondary {
  display:flex; gap:8px;
  font-size:11px; color:var(--hosq-ink-2);
}
.session-secondary button { padding:6px 0; }
.session-secondary button:hover { color:var(--hosq-dark); }

/* ============================================================
   UPLOAD / NEW APPLICATION (3 entry methods)
   ============================================================ */
.upload-wrap { display:flex; align-items:center; justify-content:center; padding:60px 24px; min-height:calc(100vh - var(--topbar-h)); }
.upload-card { width:100%; max-width:680px; background:var(--hosq-paper); border-radius:24px; padding:44px; }
.upload-eyebrow { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--hosq-ink-2); margin-bottom:12px; text-align:center; }
.upload-title { font-size:30px; font-weight:700; letter-spacing:-0.015em; margin:0 0 8px; text-align:center; }
.upload-sub { font-size:14px; color:var(--hosq-ink-2); margin:0 0 24px; text-align:center; }

.method-tabs {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:6px;
  background:var(--hosq-cream);
  padding:4px;
  border-radius:14px;
  margin-bottom:18px;
}
.method-tab {
  padding:10px 8px; border-radius:10px;
  font-size:12px; font-weight:600; letter-spacing:0.02em;
  text-align:center;
  color:var(--hosq-ink-2);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  transition:background .12s, color .12s;
}
.method-tab:hover { color:var(--hosq-dark); }
.method-tab.is-active { background:var(--hosq-dark); color:var(--hosq-cream); }
.method-tab svg { width:16px; height:16px; }
.method-tab .tag {
  font-size:9px; padding:1px 6px;
  border-radius:999px;
  background:var(--hosq-coral); color:white;
  letter-spacing:0.06em;
  margin-top:-2px;
}

.method-pane { display:none; }
.method-pane.is-active { display:block; }

.dropzone { border:2px dashed var(--hosq-line-2); border-radius:16px; padding:36px 24px; transition:background .15s, border-color .15s; text-align:center; }
.dropzone:hover, .dropzone.is-drag { background:var(--hosq-cream); border-color:var(--hosq-coral); }
.dropzone-cta { display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:var(--hosq-dark); color:var(--hosq-cream); border-radius:999px; font-size:13px; font-weight:600; letter-spacing:0.02em; }
.dropzone-meta { margin-top:12px; font-size:12px; color:var(--hosq-ink-2); }

.upload-textarea { width:100%; min-height:140px; padding:14px; border:1px solid var(--hosq-line-2); border-radius:12px; font-size:14px; background:var(--hosq-cream); resize:vertical; outline:none; transition:border-color .15s, box-shadow .15s; }
.upload-textarea:focus { border-color:var(--hosq-dark); box-shadow:0 0 0 3px rgba(35,31,32,0.08); }

.chat-start-prompts {
  display:flex; flex-direction:column; gap:6px;
  margin-bottom:14px;
}
.chat-start-prompts .seed {
  text-align:left;
  padding:12px 14px;
  background:var(--hosq-cream);
  border-radius:12px;
  font-size:13px; color:var(--hosq-dark);
  transition:background .12s;
}
.chat-start-prompts .seed:hover { background:rgba(35,31,32,0.08); }
.chat-start-prompts .seed .label {
  font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--hosq-ink-2); margin-bottom:4px; display:block;
}

.upload-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
.btn-ghost { padding:9px 14px; font-size:13px; font-weight:500; color:var(--hosq-ink-2); border-radius:999px; }
.btn-ghost:hover { background:rgba(35,31,32,0.05); color:var(--hosq-dark); }
.btn-primary { padding:9px 16px; background:var(--hosq-coral); color:white; border-radius:999px; font-size:13px; font-weight:600; letter-spacing:0.02em; }
.btn-primary:hover { filter:brightness(1.05); }

/* ============================================================
   KNOWLEDGE BASE DRAWER
   ============================================================ */
.drawer-overlay {
  position:fixed; inset:0; z-index:90;
  background:rgba(35,31,32,0.30);
  display:none;
}
.drawer-overlay.is-open { display:block; }
.drawer {
  position:fixed; top:0; right:0; bottom:0; z-index:91;
  width:420px; max-width:96vw;
  background:var(--hosq-cream);
  transform:translateX(100%); transition:transform .25s ease;
  display:flex; flex-direction:column;
}
.drawer.is-open { transform:translateX(0); }
.drawer-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 22px;
  border-bottom:1px solid var(--hosq-line);
  flex-shrink:0;
}
.drawer-head h2 { font-size:18px; font-weight:700; margin:0; letter-spacing:-0.01em; }
.drawer-head .close { font-size:22px; color:var(--hosq-ink-2); width:32px; height:32px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; }
.drawer-head .close:hover { background:rgba(35,31,32,0.06); color:var(--hosq-dark); }
.drawer-body { flex:1; overflow-y:auto; padding:20px 22px 32px; }

.knowledge-section-eyebrow {
  font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--hosq-ink-2);
  margin-bottom:10px;
}
.knowledge-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
.knowledge-card {
  padding:14px 16px;
  background:var(--hosq-paper);
  border-radius:14px;
  display:flex; flex-direction:column; gap:6px;
  cursor:pointer;
  transition:background .12s;
}
.knowledge-card:hover { background:rgba(35,31,32,0.06); }
.knowledge-card .kc-title { font-size:14px; font-weight:600; color:var(--hosq-dark); }
.knowledge-card .kc-meta { font-size:11px; color:var(--hosq-ink-2); display:flex; gap:8px; flex-wrap:wrap; }
.knowledge-card .kc-state {
  padding:1px 7px; border-radius:999px;
  font-size:9px; font-weight:700; letter-spacing:0.06em;
}
.kc-state.live { background:rgba(20,182,114,0.18); color:#0a6b41; }
.kc-state.pending { background:rgba(224,162,58,0.20); color:#7d4d10; }
.kc-state.draft { background:rgba(35,31,32,0.10); color:var(--hosq-ink-2); }
.knowledge-card .kc-summary { font-size:13px; color:var(--hosq-dark); line-height:1.5; }

.expert-cta {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%;
  padding:12px;
  background:var(--hosq-dark); color:var(--hosq-cream);
  border-radius:14px;
  font-size:13px; font-weight:600;
  margin-bottom:8px;
}
.expert-cta:hover { opacity:0.92; }

/* expert-brief modal */
.modal-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(35,31,32,0.40);
  display:none;
  align-items:center; justify-content:center;
  padding:40px 16px;
}
.modal-overlay.is-open { display:flex; }
.modal {
  width:100%; max-width:560px;
  background:var(--hosq-cream);
  border-radius:20px;
  overflow:hidden;
  display:flex; flex-direction:column;
  max-height:90vh;
}
.modal-head { padding:20px 24px; border-bottom:1px solid var(--hosq-line); display:flex; align-items:center; justify-content:space-between; }
.modal-head h2 { font-size:18px; font-weight:700; margin:0; letter-spacing:-0.01em; }
.modal-head .close { font-size:22px; color:var(--hosq-ink-2); width:30px; height:30px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; }
.modal-head .close:hover { background:rgba(35,31,32,0.06); color:var(--hosq-dark); }
.modal-body { padding:20px 24px; overflow-y:auto; flex:1; }
.modal-foot { padding:14px 24px 18px; border-top:1px solid var(--hosq-line); display:flex; justify-content:space-between; gap:8px; align-items:center; }

.field-stack { display:flex; flex-direction:column; gap:14px; }
.field-stack .lbl { display:block; font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--hosq-ink-2); margin-bottom:6px; }
.field-stack input, .field-stack textarea {

/* helpers ------------------------------------------------ */
function splitFields(phase) {
  const facts = [], prose = [];
  for (const f of phase.fields) {
    const v = f.value; if (!v) continue;
    if (v.kind === "inline" || v.kind === "chip" || v.kind === "chips") facts.push(f);
    else prose.push(f);
  }
  return { facts, prose };
}
function phaseFillState(phase) {
  let total = phase.fields.length, full = 0;
  for (const f of phase.fields) {
    const v = f.value; if (!v) continue;
    if (v.kind === "placeholder") continue;
    if (v.kind === "inline" && (!v.text || v.text === "")) continue;
    if (v.kind === "chips" && (!v.items || v.items.length === 0)) continue;
    full += 1;
  }
  if (full === total) return "full";
  if (full === 0) return "empty";
  return "partial";
}
function phaseScore(phase, app) {
  const codes = new Set();
  for (const f of phase.fields) {
    const v = f.value; if (!v) continue;
    if (v.kind === "para" && v.metrics) v.metrics.forEach(m => codes.add(m));
    if (v.kind === "paras") (v.paras || []).forEach(p => (p.metrics || []).forEach(m => codes.add(m)));
  }
  if (codes.size === 0) return null;
  let sum = 0, n = 0;
  for (const c of codes) if (app.subScores && app.subScores[c] != null) { sum += app.subScores[c]; n += 1; }
  return n ? Math.round(sum / n) : null;
}
function barColor(s) {
  if (s >= 80) return "var(--hosq-good)";
  if (s >= 70) return "var(--hosq-blue)";
  if (s >= 60) return "var(--hosq-warn)";
  return "var(--hosq-bad)";
}

/* state -------------------------------------------------- */
const state = {
  mode: "writing",
  activeAppId: NOTATIONS.id,
  selectedParaEl: null,
  expandedVector: null,
  highlightedMetrics: new Set(),
  uploadMethod: "chat",
  openCritiques: new Set(),
  expertStep: 0,
};
function activeApp() { return APPS.find(a => a.id === state.activeAppId); }

/* tabs --------------------------------------------------- */
function renderTabs() {
  const root = document.getElementById("tabs");
  root.innerHTML = "";
  for (const app of APPS) {
    const isActive = app.id === state.activeAppId;
    const btn = document.createElement("button");
    btn.className = "tab" + (isActive ? " is-active" : "");
    if (app.isNew) {
      btn.innerHTML = `<span class="dot" style="background:transparent;border:1.5px dashed currentColor"></span><span>${app.title}</span>`;
    } else if (app.isChat) {
      btn.innerHTML = `<span class="dot" style="background:var(--hosq-violet)"></span><span>${app.title}</span><span class="stage-mini">brief</span>`;
    } else {
      btn.innerHTML = `<span class="dot"></span><span>${app.title}</span><span class="score-mini">${app.score ?? ""}</span>`;
      const close = document.createElement("span");
      close.className = "tab-close"; close.textContent = "×"; close.title = "Close (mock)";
      close.onclick = (e) => { e.stopPropagation(); };
      btn.appendChild(close);
    }
    btn.onclick = () => { state.activeAppId = app.id; renderAll(); };
    root.appendChild(btn);
  }
  const add = document.createElement("button");
  add.className = "tab-add"; add.textContent = "+"; add.title = "New application";
  add.onclick = () => { state.activeAppId = NEW_APP.id; renderAll(); };
  root.appendChild(add);
}

/* mode toggle -------------------------------------------- */
function renderModeToggle() {
  const tg = document.getElementById("modeToggle");
  const buttons = tg.querySelectorAll("button");
  buttons.forEach(b => {
    b.classList.toggle("is-active", b.dataset.mode === state.mode);
    b.onclick = () => {
      if (state.mode === b.dataset.mode) return;
      state.mode = b.dataset.mode;
      document.body.classList.toggle("mode-writing", state.mode === "writing");
      document.body.classList.toggle("mode-scoring", state.mode === "scoring");
      state.expandedVector = null;
      state.selectedParaEl = null;
      state.highlightedMetrics.clear();
      renderAll();
      flashHint(state.mode === "writing" ? "Writing mode — click a paragraph for the coach." : "Scoring mode — click a vector to drill into 39 sub-indices.");
    };
  });
  positionGlider();
}
function positionGlider() {
  const tg = document.getElementById("modeToggle");
  const glider = document.getElementById("modeGlider");
  const active = tg.querySelector("button.is-active");
  if (!active || !glider) return;
  glider.style.left = active.offsetLeft + "px";
  glider.style.width = active.offsetWidth + "px";
}

/* shell -------------------------------------------------- */
function renderShell() {
  const shell = document.getElementById("shell");
  const app = activeApp();
  document.body.classList.toggle("view-chat", !!app.isChat);
  if (app.isNew) { shell.innerHTML = renderEmptyShell(); wireEmptyShell(); return; }
  if (app.isChat) { shell.innerHTML = renderChatShell(app); wireChatShell(app); return; }
  const phases = notationsContent();
  shell.innerHTML = `
    ${renderOutline(phases, app)}
    <main class="doc">
      ${renderDocHeader(app)}
      ${phases.map(p => renderPhase(p, app)).join("")}
    </main>
    ${state.mode === "writing" ? renderWritingPanel(app) : renderScoringPanel(app)}
  `;
  wireOutline();
  wireDoc();
  wireScoreBtn(app);
  wireStageBadge(app);
  if (state.mode === "scoring") wireScoringPanel(app);
  if (state.mode === "writing") renderCoachPanel();
}

/* outline ------------------------------------------------ */
function renderOutline(phases, app) {
  const rows = phases.map(p => {
    const fs = phaseFillState(p);
    const score = phaseScore(p, app);
    const writingViz = `<span class="writing-only"><span class="dot-state ${fs}"></span></span>`;
    const scoringViz = `<span class="scoring-only">${score == null ? `<span class="bar-state"></span>` : `<span class="bar-state"><span class="fill" style="width:${score}%; background:${barColor(score)}"></span></span>`}</span>`;
    return `
      <button class="outline-row" data-phase="${p.n}">
        <span class="num">${String(p.n).padStart(2,"0")}</span>
        <span class="label">${escapeHtml(p.title)}</span>
        <span class="state-cell">${writingViz}${scoringViz}</span>
      </button>`;
  }).join("");
  return `
    <aside class="outline" id="outline">
      <div class="outline-inner">
        <button class="rail-pin" id="railPin" title="Pin outline open">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
          <span class="label-pin">Pin</span>
        </button>
        <div class="outline-list">${rows}</div>
        <div class="outline-foot">
          <span style="font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--hosq-ink-2)">Completion</span>
          <span class="progress-num">${app.completion}<span style="font-size:11px;color:var(--hosq-ink-2);font-weight:500"> / 100%</span></span>
          <div class="progress-bar"><span class="fill" style="width:${app.completion}%"></span></div>
        </div>
      </div>
    </aside>`;
}
function wireOutline() {
  document.querySelectorAll(".outline-row").forEach(row => {
    row.onclick = () => {
      const n = row.dataset.phase;
      const tgt = document.getElementById("phase-" + n);
      if (tgt) tgt.scrollIntoView({ behavior: "smooth", block: "start" });
      document.querySelectorAll(".outline-row").forEach(r => r.classList.remove("is-active"));
      row.classList.add("is-active");
    };
  });
  const pin = document.getElementById("railPin");
  if (pin) pin.onclick = () => {
    document.body.classList.toggle("outline-pinned");
    flashHint(document.body.classList.contains("outline-pinned") ? "Outline pinned." : "Outline auto-collapses on mouse out.");
  };
}

/* doc header (with stage badge) -------------------------- */
function renderStageBadge(app) {
  const stage = STAGES.find(s => s.id === app.stage) || STAGES[0];
  const cls = "s-" + (stage.id === "production" ? "production" : stage.id);
  const opts = STAGES.map(s => `
    <button data-stage="${s.id}">
      <span class="dot" style="background:${s.id === app.stage ? "var(--hosq-coral)" : "var(--hosq-line-2)"}"></span>
      <span>${escapeHtml(s.label)}</span>
      <span class="meta">${escapeHtml(s.meta)}</span>
    </button>`).join("");
  return `
    <span class="stage-badge ${cls}" id="stageBadge" tabindex="0">
      <span class="dot"></span>
      <span>${escapeHtml(stage.label)}</span>
      <span class="caret">▼</span>
      <span class="stage-popover" id="stagePopover">${opts}</span>
    </span>`;
}
function wireStageBadge(app) {
  const badge = document.getElementById("stageBadge");
  const pop = document.getElementById("stagePopover");
  if (!badge || !pop) return;
  badge.onclick = (e) => {
    e.stopPropagation();
    pop.classList.toggle("is-open");
  };
  pop.querySelectorAll("button").forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    app.stage = b.dataset.stage;
    pop.classList.remove("is-open");
    renderAll();
    flashHint(`Stage changed to ${b.querySelector("span:nth-child(2)").textContent}.`);
  });
  document.addEventListener("click", () => pop.classList.remove("is-open"), { once: true });
}

function renderDocHeader(app) {
  return `
    <header class="doc-header">
      <div class="doc-eyebrow">
        ${renderStageBadge(app)}

/* phase rendering ---------------------------------------- */
function renderPhase(p, app) {
  const { facts, prose } = splitFields(p);
  const specimen = facts.length ? renderSpecimen(facts) : "";
  const body = prose.length ? `<div class="phase-body">${prose.map(f => renderProseBlock(f, p)).join("")}</div>` : "";
  return `
    <section class="phase ${p.auto ? "auto" : ""}" id="phase-${p.n}">
      <header class="phase-head">
        <span class="phase-eyebrow">Phase ${String(p.n).padStart(2,"0")}${p.auto ? ` <span class="auto-tag">auto</span>` : ""}</span>
        <h2 class="phase-title">${escapeHtml(p.title)}</h2>
      </header>
      ${specimen}
      ${body}
    </section>`;
}

function renderSpecimen(facts) {
  const parts = facts.map(f => {
    const v = f.value;
    let inner = "";
    const af = v.autoFilled ? ` <span class="auto-pill" style="font-size:9px;padding:0 5px;border-radius:999px;background:rgba(196,124,241,0.18);color:#6e2da7;font-weight:700;letter-spacing:0.04em">AUTO</span>` : "";
    if (v.kind === "inline") {
      const cls = v.muted ? "inline-edit muted" : "inline-edit";
      inner = `<span class="${cls}" contenteditable="true">${escapeHtml(v.text)}</span>${af}`;
    } else if (v.kind === "chip") {
      inner = `<span class="chip ${v.variant || ""}">${escapeHtml(v.text)}</span>${af}`;
    } else if (v.kind === "chips") {
      inner = `<span class="chip-row">${(v.items || []).map(([t, va]) => `<span class="chip ${va || ""}">${escapeHtml(t)}</span>`).join("")}</span>${af}`;
    }
    return `<span class="fact" data-label="${escapeHtml(f.label)}">${inner}</span>`;
  });
  return `<div class="specimen">${parts.join('<span class="dot-sep">·</span>')}</div>`;
}

function renderProseBlock(field, phase) {
  const v = field.value;
  if (v.kind === "placeholder") {
    return `<p class="placeholder-prose"><span class="ph-label">${escapeHtml(field.label)}</span>${escapeHtml(v.text)}</p>`;
  }
  const isAuto = !!v.autoFilled;
  const paras = v.kind === "paras" ? (v.paras || []) : [{ text: v.text, metrics: v.metrics }];
  const allMetrics = [...new Set(paras.flatMap(p => p.metrics || []))];
  const innerParas = paras.map(p => `<p class="editable para" contenteditable="true" data-metrics="${(p.metrics || []).join(",")}">${escapeHtml(p.text)}</p>`).join("");
  const customizeLink = isAuto ? `<button class="auto-customize" data-customize="${escapeHtml(field.label)}">customize for this project →</button>` : "";
  const challengeBtn = CHALLENGES[field.label]
    ? `<button class="challenge-btn" data-challenge="${escapeHtml(field.label)}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linejoin="round"/></svg>Challenge</button>`
    : "";
  return `
    <div class="prose-block ${field.req ? "is-req" : ""} ${isAuto ? "is-auto" : ""}" data-label="${escapeHtml(field.label)}">
      <div class="prose-caption">
        <span class="prose-label">${escapeHtml(field.label)}</span>
        ${isAuto ? `<span class="auto-pill">AUTO · HOSQ default</span>` : ""}
        ${allMetrics.length ? allMetrics.map(m => `<span class="metric-tag">${m}</span>`).join("") : ""}
        ${field.req ? `<span class="req-dot" title="required"></span>` : ""}
        ${challengeBtn}
      </div>
      ${innerParas}
      ${customizeLink}
      <div class="critique-slot" data-critique-for="${escapeHtml(field.label)}"></div>
    </div>`;
}

function renderSparkline(app) {
  const hist = app.scoreHistory || [];
  if (hist.length < 2) return "";
  const max = Math.max(...hist.map(h => h.score), 100);
  const min = Math.min(...hist.map(h => h.score), 0);
  const range = Math.max(1, max - min);
  const cols = hist.map((h, i) => {
    const heightPct = ((h.score - min) / range) * 100;
    const isLast = i === hist.length - 1;
    return `
      <div class="spark-col ${isLast ? "is-current" : ""}" title="${h.at}: ${h.score}">
        <span class="bar" style="height:${Math.max(8, heightPct)}%"></span>
        <span>${h.score}</span>
      </div>`;
  }).join("");
  return `<div class="spark">${cols}</div>`;
}

function renderDelta(app) {
  if (app.prevScore == null) return "";
  const d = app.score - app.prevScore;
  if (d === 0) return `<span class="delta flat">—</span>`;
  if (d > 0)  return `<span class="delta up">▲ ${d}</span>`;
  return `<span class="delta down">▼ ${Math.abs(d)}</span>`;
}

function topWeakSpotsStaged(app, n = 3) {
  const allowed = STAGE_RELEVANCE[app.stage] || STAGE_RELEVANCE.done;
  const allRanked = VECTORS.map(v => {
    const subs = SUBINDICES[v.code] || [];
    const subWeak = subs.map(([code, name]) => [code, name, app.subScores[code] ?? 0])
      .sort((a, b) => a[2] - b[2])[0];
    return {
      code: v.code, name: v.name,
      score: app.vectorScores[v.code] ?? 0,
      subWeak: subWeak ? [subWeak[0], subWeak[1]] : null,
      relevant: allowed.has(v.code),
    };
  });
  const filtered = allRanked.filter(v => v.relevant).sort((a, b) => a.score - b.score);
  const hidden = allRanked.length - filtered.length;
  return { weak: filtered.slice(0, n), hidden };
}

function renderVecItem(v, app, isRelevant) {
  const score = app.vectorScores[v.code] ?? 0;
  const cls = score >= 80 ? "good" : score >= 70 ? "ok" : score >= 60 ? "warn" : "bad";
  const expanded = state.expandedVector === v.code;
  const subs = SUBINDICES[v.code] || [];
  const subRows = subs.map(([code, name]) => {
    const s = app.subScores[code] ?? 0;
    const sCls = s >= 80 ? "good" : s >= 70 ? "ok" : s >= 60 ? "warn" : "bad";
    const isWorst = subs.map(([c]) => app.subScores[c] ?? 0).sort((a,b)=>a-b)[0] === s;
    return `
      <button class="sub-row" data-sub="${code}" style="text-align:left;width:100%;background:none;border:none;padding:5px 0;cursor:pointer">
        <span class="sub-code">${code}</span>
        <span class="sub-name">${escapeHtml(name)}${isWorst ? ' <span class="muted" style="font-size:10px">· weakest in vector</span>' : ""}</span>
        <span class="sub-score t-${sCls}">${s}</span>
      </button>`;
  }).join("");
  const narratives = subs.map(([code]) => app.subNarratives[code] ? { code, text: app.subNarratives[code] } : null).filter(Boolean);
  const narrativeBlock = narratives.length
    ? narratives.map(n => `<div class="sub-narrative"><strong style="color:var(--hosq-dark)">${n.code}:</strong> ${escapeHtml(n.text)} <a class="sub-jump" data-jump="${n.code}">↳ highlight in document</a></div>`).join("")
    : `<div class="sub-narrative muted">No specific weak-spot narrative for this vector. Open sub-indices above for detail.</div>`;
  return `
    <div class="vec-item ${expanded ? "is-expanded" : ""} ${!isRelevant ? "is-skip" : ""}" data-vec="${v.code}">
      <div class="vec-item-row" style="cursor:pointer" data-vec-toggle="${v.code}">
        <span class="vec-code">${v.code}</span>
        <span class="vec-name">${escapeHtml(v.name)}${!isRelevant ? `<span class="skip-tag">later stage</span>` : ""}</span>
        <span class="vec-score">
          <span class="vec-score-bar"><span class="fill q-${cls}" style="width:${score}%"></span></span>
          <span class="num t-${cls}">${score}</span>
        </span>
      </div>
      <div class="subs">
        ${subRows}
        ${narrativeBlock}
      </div>
    </div>`;
}

  document.querySelectorAll(".specimen .inline-edit").forEach(s => s.addEventListener("input", onEdit));

  });

    block.classList.remove("is-auto");
    block.classList.add("is-customized");

  });

    if (!slot) return;
    if (state.openCritiques.has(label)) {
      slot.innerHTML = "";
      state.openCritiques.delete(label);
      return;
    }
    state.openCritiques.add(label);
    slot.innerHTML = `
      <div class="critique">
        <div class="critique-head"><span class="dot"></span><span>Adversarial read · doesn't re-score</span></div>
        ${CHALLENGES[label]}
        <div class="critique-actions">

          <button class="dismiss">Dismiss</button>

    slot.querySelector(".dismiss").onclick = () => { slot.innerHTML = ""; state.openCritiques.delete(label); };

function onEdit() {
  const app = activeApp();
  app.dirtySinceScore = (app.dirtySinceScore || 0) + 1;
  patchStaleHeader(app);
}
function patchStaleHeader(app) {
  const meta = document.querySelector(".score-meta");
  if (!meta) return;
  meta.classList.add("is-stale");
  const span = meta.querySelector("span:last-child");
  if (span) span.innerHTML = `<strong>${app.dirtySinceScore} edits</strong> since last score · ${app.lastScoreMinutesAgo} min ago`;
  document.querySelector(".score-block")?.classList.add("is-stale");
  document.querySelector(".vec-list")?.classList.add("is-stale");
  const btn = document.getElementById("scoreBtn");
  if (btn) {
    btn.classList.toggle("is-cooling", app.dirtySinceScore < 5);
    btn.querySelector("span").textContent = "Re-score";
  }
}

function wireScoreBtn(app) {
  const btn = document.getElementById("scoreBtn");
  if (!btn) return;
  btn.onclick = () => {
    if (app.dirtySinceScore === 0) { flashHint("Score is fresh — no edits since last run."); return; }
    if (app.dirtySinceScore < 5) {
      const ok = confirm("Recent score is still fresh and your edits are minor. Re-score anyway?\n\nScoring is computationally expensive — batching edits saves cost.");
      if (!ok) return;
    }
    runScore(app);
  };
  document.getElementById("seeAllBtn")?.addEventListener("click", () => {
    state.mode = "scoring";
    document.body.classList.add("mode-scoring");
    document.body.classList.remove("mode-writing");
    renderAll();
    flashHint("Switched to Scoring mode — all 10 vectors visible.");
  });
}
function runScore(app) {
  const drift = Math.round((Math.random() - 0.4) * 4);
  app.prevScore = app.score;
  app.score = Math.max(0, Math.min(100, app.score + drift));
  app.dirtySinceScore = 0;
  app.lastScoreMinutesAgo = 0;
  for (const v of VECTORS) app.vectorScores[v.code] = Math.max(0, Math.min(100, (app.vectorScores[v.code] ?? 0) + Math.round((Math.random() - 0.4) * 3)));
  if (app.scoreHistory) app.scoreHistory.push({ at: "now", score: app.score, edits: 0 });
  if (app.scoreHistory && app.scoreHistory.length > 5) app.scoreHistory.shift();
  flashHint("Re-scored. Cost charged.");
  renderAll();
}

function wireScoringPanel(app) {
  document.querySelectorAll("[data-vec-toggle]").forEach(el => {
    el.onclick = () => {
      const v = el.dataset.vecToggle;
      state.expandedVector = state.expandedVector === v ? null : v;
      const sub = SUBINDICES[v] || [];
      state.highlightedMetrics = new Set(sub.map(([c]) => c));
      applyMetricHighlights();
      renderShell();
    };
  });
  document.querySelectorAll("[data-sub]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const code = el.dataset.sub;
      state.highlightedMetrics = new Set([code]);
      applyMetricHighlights();
      flashHint(`Highlighted paragraphs driving ${code}.`);
    };
  });
  document.querySelectorAll("[data-jump]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const code = el.dataset.jump;
      state.highlightedMetrics = new Set([code]);

      const first = document.querySelector(`.editable.para[data-metrics*="${code}"]`);
      if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
    };
  });
}
function applyMetricHighlights() {
  document.querySelectorAll(".editable.para").forEach(p => {
    const codes = (p.dataset.metrics || "").split(",").filter(Boolean);
    const hit = codes.some(c => state.highlightedMetrics.has(c));
    p.classList.toggle("is-related", hit);
  });
}

  wireStageBadge(app);

  const inp = document.getElementById("chatInput");

      const aiReply = app.hardMode
        ? `<p>Hard read: <strong>your last answer leans on intuition.</strong> Convert one of these to evidence:</p><ol><li>Name the data point that would falsify your claim.</li><li>What did you discard from your previous answer to make this one tidy? Restore it.</li></ol>`

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Drop PDF
            </button>
          </div>

          <div class="method-pane ${m === "chat" ? "is-active" : ""}">
            <p class="muted" style="font-size:13px;margin:0 0 12px;line-height:1.55">
              <strong style="color:var(--hosq-dark);font-weight:500">Best when</strong> the project is in your head, you don't have a doc yet,
              you want the AI to challenge you and ask deeper questions while you think out loud.
            </p>
            <div class="chat-start-prompts">
              <button class="seed" data-seed="night">
                <span class="label">Resume · Night Special (in progress)</span>
                Late-evening chill+lecture format with Crossroads festival · 3 themes covered
              </button>
              <button class="seed" data-seed="new">
                <span class="label">Fresh start</span>
                Open the Brief Builder with a blank chat — AI opens with the seed question
              </button>
            </div>
          </div>

          <div class="method-pane ${m === "paste" ? "is-active" : ""}">
            <p class="muted" style="font-size:13px;margin:0 0 12px">
              <strong style="color:var(--hosq-dark);font-weight:500">Best when</strong> you already have a 1–5 page essay or pitch text written elsewhere.
            </p>
            <textarea class="upload-textarea" id="pasteText" placeholder="Paste the project essay here…&#10;&#10;Anything from a one-paragraph pitch to a 5,000-word brief works. Russian or English."></textarea>
            <div class="upload-actions">
              <button class="btn-ghost" id="cancelNew">Cancel</button>
              <button class="btn-primary" id="parseNew">Parse with AI</button>
            </div>
          </div>

          <div class="method-pane ${m === "drop" ? "is-active" : ""}">
            <p class="muted" style="font-size:13px;margin:0 0 12px">
              <strong style="color:var(--hosq-dark);font-weight:500">Best when</strong> you have a PDF or DOCX from a partner, application archive, or earlier draft.
            </p>
            <div class="dropzone" id="dropzone">
              <button class="dropzone-cta">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Choose PDF or DOCX
              </button>
              <div class="dropzone-meta">…or drag &amp; drop. Up to 50 MB. RU / EN. No scans (OCR coming soon).</div>
            </div>
            <div class="upload-actions">
              <button class="btn-ghost" id="cancelNew2">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </main>`;
}

function wireEmptyShell() {
  document.getElementById("methodTabs")?.querySelectorAll(".method-tab").forEach(t => {
    t.onclick = () => { state.uploadMethod = t.dataset.method; renderShell(); };
  });
  document.getElementById("cancelNew")?.addEventListener("click", () => { state.activeAppId = NOTATIONS.id; renderAll(); });
  document.getElementById("cancelNew2")?.addEventListener("click", () => { state.activeAppId = NOTATIONS.id; renderAll(); });
  document.getElementById("parseNew")?.addEventListener("click", () => {
    flashHint("Parsing… (mock — opening sample application)");
    setTimeout(() => { state.activeAppId = NOTATIONS.id; renderAll(); }, 600);
  });
  const dz = document.getElementById("dropzone");
  if (dz) {
    ["dragenter","dragover"].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add("is-drag"); }));
    ["dragleave","drop"].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove("is-drag"); }));
    dz.addEventListener("drop", () => {
      flashHint("File received (mock — opening sample application)");
      setTimeout(() => { state.activeAppId = NOTATIONS.id; renderAll(); }, 600);
    });
  }
  document.querySelectorAll("[data-seed]").forEach(b => b.onclick = () => {
    const seed = b.dataset.seed;
    if (seed === "night") { state.activeAppId = NIGHT_SPECIAL.id; renderAll(); return; }
    /* fresh start: reset Night Special chat (mock) */
    NIGHT_SPECIAL.chat = [{ from: "ai", eyebrow: "Brief Builder · Socratic", text: "What's the seed of this project? One or two sentences — the working hypothesis, not the polished pitch." }];
    NIGHT_SPECIAL.themes.forEach(t => { t.done = false; t.q = 0; });
    NIGHT_SPECIAL.title = "Untitled brief";
    NIGHT_SPECIAL.subtitle = "Started just now · Brief Builder";
    state.activeAppId = NIGHT_SPECIAL.id;
    renderAll();
  });
}

/* ============================================================
   KNOWLEDGE DRAWER + EXPERT MODAL
   ============================================================ */
function openDrawer() {
  document.getElementById("drawerOverlay").classList.add("is-open");
  document.getElementById("drawer").classList.add("is-open");
  document.getElementById("kbBtn").classList.add("is-active");
  renderDrawerBody();
}
function closeDrawer() {
  document.getElementById("drawerOverlay").classList.remove("is-open");
  document.getElementById("drawer").classList.remove("is-open");
  document.getElementById("kbBtn").classList.remove("is-active");
}
function renderDrawerBody() {
  const body = document.getElementById("drawerBody");
  const live = KNOWLEDGE_MODULES.filter(k => k.state === "live");
  const pending = KNOWLEDGE_MODULES.filter(k => k.state === "pending");
  body.innerHTML = `
    <button class="expert-cta" id="newExpert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Brief a new expert interview
    </button>
    <p class="muted" style="font-size:12px;margin:6px 0 22px;line-height:1.5">
      When the AI doesn't know your domain — name it, draft questions with AI's help, run the call, upload a transcript.
      Output becomes a knowledge module the AI cites in future sessions.
    </p>

    ${live.length ? `<div class="knowledge-section-eyebrow">Live · ${live.length}</div><div class="knowledge-list">${live.map(renderKCard).join("")}</div>` : ""}
    ${pending.length ? `<div class="knowledge-section-eyebrow">Pending · ${pending.length}</div><div class="knowledge-list">${pending.map(renderKCard).join("")}</div>` : ""}
  `;
  document.getElementById("newExpert").onclick = () => openExpertModal({});
}
function renderKCard(k) {
  return `
    <div class="knowledge-card" data-k="${k.id}">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="kc-title">${escapeHtml(k.title)}</div>
        <span class="kc-state ${k.state}">${k.state}</span>
      </div>
      <div class="kc-meta">
        <span>${escapeHtml(k.expert)}</span>
        <span>·</span>
        <span>${escapeHtml(k.when)}</span>
      </div>
      <div class="kc-summary">${escapeHtml(k.summary)}</div>
    </div>`;
}

function openExpertModal(opts = {}) {
  CURRENT_EXPERT = {
    topic: opts.topic || "",
    gap: "",
    questions: [],
    step: 0,
  };
  state.expertStep = 0;
  document.getElementById("expertOverlay").classList.add("is-open");
  renderExpertModal();
}
function closeExpertModal() {
  document.getElementById("expertOverlay").classList.remove("is-open");
  CURRENT_EXPERT = null;
}
function renderExpertModal() {
  const body = document.getElementById("expertBody");
  const foot = document.getElementById("expertFoot");
  const title = document.getElementById("expertTitle");
  const e = CURRENT_EXPERT;
  if (!e) return;
  const STEPS = ["Brief", "Questions", "Interview", "Digest", "Live"];
  const stateStrip = `<div class="expert-state">${STEPS.map((s, i) => `<span class="step ${i === state.expertStep ? "is-current" : ""} ${i < state.expertStep ? "is-done" : ""}">${i + 1}. ${s}</span>`).join("")}</div>`;

  if (state.expertStep === 0) {
    title.textContent = "Brief a new expert interview";
    body.innerHTML = `
      ${stateStrip}
      <div class="field-stack">
        <div>
          <span class="lbl">Topic — what does the AI not know?</span>
          <input id="expTopic" placeholder="e.g. Vinyl production in Armenia" value="${escapeHtml(e.topic)}">
        </div>
        <div>
          <span class="lbl">What's the gap (1–2 sentences)?</span>
          <textarea id="expGap" placeholder="What does the project need to know that AI guesses badly today?">${escapeHtml(e.gap)}</textarea>
        </div>
      </div>`;
    foot.innerHTML = `
      <button class="btn-ghost" id="expCancel">Cancel</button>
      <button class="btn-primary" id="expNext">Generate questions →</button>`;
    document.getElementById("expCancel").onclick = closeExpertModal;
    document.getElementById("expNext").onclick = () => {
      e.topic = document.getElementById("expTopic").value.trim() || "Untitled topic";
      e.gap = document.getElementById("expGap").value.trim();
      e.questions = mockQuestionsFor(e.topic);
      state.expertStep = 1;
      renderExpertModal();
    };
  } else if (state.expertStep === 1) {
    title.textContent = `${e.topic} · questions`;
    body.innerHTML = `
      ${stateStrip}
      <p class="muted" style="font-size:12px;margin:0 0 8px">8 questions drafted by AI. Edit, remove, or accept.</p>
      <div class="q-list">
        ${e.questions.map((q, i) => `
          <div class="q-row">
            <span class="qn">${i + 1}</span>
            <span contenteditable="true" data-q-i="${i}">${escapeHtml(q)}</span>
            <span class="qx" data-rm="${i}">×</span>
          </div>`).join("")}
      </div>
      <button id="addQ" style="font-size:12px;font-weight:600;color:var(--hosq-ink-2);margin-top:6px">+ add a question</button>`;
    foot.innerHTML = `
      <button class="btn-ghost" id="expBack">← Back</button>
      <button class="btn-primary" id="expSchedule">Save brief · schedule interview →</button>`;
    document.getElementById("expBack").onclick = () => { state.expertStep = 0; renderExpertModal(); };
    document.getElementById("expSchedule").onclick = () => { state.expertStep = 2; renderExpertModal(); };
    document.querySelectorAll("[data-rm]").forEach(b => b.onclick = () => {
      const i = +b.dataset.rm;
      e.questions.splice(i, 1);
      renderExpertModal();
    });
    document.getElementById("addQ").onclick = () => {
      e.questions.push("New question…");
      renderExpertModal();
    };
  } else if (state.expertStep === 2) {
    title.textContent = `${e.topic} · interview`;
    body.innerHTML = `
      ${stateStrip}
      <p style="font-size:14px;line-height:1.55">Interview brief saved. Run your call, then come back and upload the transcript.</p>
      <div class="dropzone" style="margin-top:14px">
        <button class="dropzone-cta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Upload transcript (.txt / .vtt)
        </button>
        <div class="dropzone-meta">or paste transcript text below</div>
      </div>
      <textarea class="upload-textarea" placeholder="Paste transcript…" style="margin-top:12px"></textarea>`;
    foot.innerHTML = `
      <button class="btn-ghost" id="expBack">← Back to questions</button>
      <button class="btn-primary" id="expDigest">Digest into knowledge module →</button>`;
    document.getElementById("expBack").onclick = () => { state.expertStep = 1; renderExpertModal(); };
    document.getElementById("expDigest").onclick = () => { state.expertStep = 3; renderExpertModal(); setTimeout(() => { state.expertStep = 4; renderExpertModal(); }, 1200); };
  } else if (state.expertStep === 3) {
    title.textContent = `${e.topic} · digesting`;
    body.innerHTML = `${stateStrip}<p style="font-size:14px;line-height:1.55">AI is reading the transcript and producing a structured knowledge module. Takes ~30 sec normally.</p>
      <div style="margin:18px 0;height:6px;background:var(--hosq-line);border-radius:999px;overflow:hidden">
        <div style="width:60%;height:100%;background:var(--hosq-coral);border-radius:999px;transition:width 1s"></div>
      </div>`;
    foot.innerHTML = `<span style="font-size:11px;color:var(--hosq-ink-2)">processing…</span>`;
  } else if (state.expertStep === 4) {
    title.textContent = `${e.topic} · live`;
    KNOWLEDGE_MODULES.unshift({
      id: "k-" + Date.now(),
      title: e.topic,
      state: "live",
      expert: "Mock expert",
      when: "just now",
      summary: e.gap || "Knowledge module digested from transcript and indexed for AI reference.",
    });
    body.innerHTML = `${stateStrip}
      <p style="font-size:14px;line-height:1.55"><strong style="color:var(--hosq-good)">✓ Knowledge module live.</strong> The AI will now cite this module when relevant in any chat or critique.</p>
      <div class="knowledge-card" style="margin-top:14px;background:var(--hosq-cream)">
        <div class="kc-title">${escapeHtml(e.topic)}</div>
        <div class="kc-summary">${escapeHtml(e.gap || "Indexed from your interview transcript.")}</div>
      </div>`;
    foot.innerHTML = `<button class="btn-primary" id="expDone" style="margin-left:auto">Done</button>`;
    document.getElementById("expDone").onclick = () => { closeExpertModal(); openDrawer(); };
  }
}
function mockQuestionsFor(topic) {
  return [
    `What's the production capacity in ${topic.split(" in ").pop() || "this domain"} today, in concrete numbers?`,
    `Which actors hold the bottleneck — and is it physical, regulatory, or social?`,
    `What's the realistic lead time from order to delivery, end-to-end?`,
    `What does the cost curve look like at 100, 500, 2000 unit volumes?`,
    `What gets imported vs. produced locally, and why has that split persisted?`,
    `Who tried this before and stopped — and what stopped them specifically?`,
    `What's the smallest viable experiment to test the hypothesis cheaply?`,
    `Three names of people we should talk to next, and why each of them?`,
  ];
}

/* ⌘K stub ------------------------------------------------ */
function wireCmdK() {
  const overlay = document.getElementById("cmdkOverlay");
  const open = () => { overlay.classList.add("is-open"); overlay.querySelector("input").focus(); };
  const close = () => overlay.classList.remove("is-open");
  document.getElementById("cmdkBtn").addEventListener("click", open);
  overlay.addEventListener("click", close);
  document.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); open(); }
    if (e.key === "Escape") { close(); closeDrawer(); closeExpertModal(); }
  });
}

function wireDrawer() {
  document.getElementById("kbBtn").addEventListener("click", openDrawer);
  document.getElementById("drawerClose").addEventListener("click", closeDrawer);
  document.getElementById("drawerOverlay").addEventListener("click", closeDrawer);
  document.getElementById("expertClose").addEventListener("click", closeExpertModal);
  document.getElementById("expertOverlay").addEventListener("click", (e) => { if (e.target.id === "expertOverlay") closeExpertModal(); });
}

/* utils -------------------------------------------------- */
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
let hintTimer = null;
function flashHint(text) {
  const el = document.getElementById("hintStrip");
  el.textContent = text;
  el.classList.add("is-visible");
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => el.classList.remove("is-visible"), 2400);
}

/* boot --------------------------------------------------- */
function renderAll() { renderTabs(); renderModeToggle(); renderShell(); positionGlider(); }
window.addEventListener("load", () => {
  renderAll();
  wireCmdK();
  wireDrawer();
  flashHint("Try Night Special tab (chat brief), the stage badge, or knowledge base (book icon top-right).");
});
window.addEventListener("resize", positionGlider);
</script>
