<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>hosq · curator workspace</title>

<style>
/* ===== HOSQ brand fonts ===== */
@font-face {
  font-family: "Cera Pro";
  src: url("fonts/CeraPro-Regular.woff") format("woff");
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "Cera Pro";
  src: url("fonts/CeraPro-Medium.woff") format("woff");
  font-weight: 500; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "Cera Pro";
  src: url("fonts/CeraPro-Bold.woff") format("woff");
  font-weight: 700; font-style: normal; font-display: swap;
}

/* ===== HOSQ design tokens (UNCHANGED — visual language preserved) ===== */
:root {
  --hosq-coral:   #FF6F55;
  --hosq-violet:  #C47CF1;
  --hosq-green:   #14B672;
  --hosq-blue:    #56A4CB;
  --hosq-pink:    #E770C3;
  --hosq-dark:    #231F20;
  --hosq-cream:   #EBE2D6;
  --hosq-blush:   #E8DCD4;
  --hosq-paper:   #F5EFE7;
  --hosq-ink-2:   #6B6566;
  --hosq-ink-3:   #9A9596;
  --hosq-line:    rgba(35,31,32,0.10);
  --hosq-line-2:  rgba(35,31,32,0.18);
  --hosq-good:    #14B672;
  --hosq-warn:    #E0A23A;
  --hosq-bad:     #D8553F;

  --font-sans: "Cera Pro", -apple-system, "DM Sans", system-ui, sans-serif;

  --topbar-h: 48px;       /* P3: was 56 */
  --rail-w:   56px;       /* P1: collapsed outline width */
  --rail-w-open: 280px;
  --right-w:  380px;
}

/* ===== reset ===== */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 15px;
  line-height: 1.6;
  color: var(--hosq-dark);
  background: var(--hosq-cream);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea { font-family: inherit; }

/* ===== top bar (P3: 48px) ===== */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 20px;
  height: var(--topbar-h);
  padding: 0 20px;
  background: var(--hosq-cream);
  border-bottom: 1px solid var(--hosq-line);
}
.brand {
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.01em;
  color: var(--hosq-dark);
  text-transform: lowercase;
  display: flex; align-items: center; gap: 10px;
}
.brand::after {
  content: "curator";
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--hosq-ink-2);
  padding: 2px 8px;
  border: 1px solid var(--hosq-line-2);
  border-radius: 999px;
}

.tabs {
  display: flex; align-items: center; gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  color: var(--hosq-ink-2);
  white-space: nowrap;
  transition: background .15s, color .15s;
}
.tab:hover { background: rgba(35,31,32,0.06); color: var(--hosq-dark); }
.tab.is-active { background: var(--hosq-dark); color: var(--hosq-cream); }
.tab .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--hosq-ink-3); }
.tab.is-active .dot { background: var(--hosq-coral); }
.tab .score-mini {
  font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; opacity: 0.85;
}
.tab-close {
  margin-left: 2px; width: 16px; height: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 999px; opacity: 0.5; font-size: 14px; line-height: 1;
}
.tab-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }
.tab-add {
  width: 26px; height: 26px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 17px; color: var(--hosq-ink-2);
}
.tab-add:hover { background: rgba(35,31,32,0.06); color: var(--hosq-dark); }

.mode-toggle {
  display: inline-flex;
  background: rgba(35,31,32,0.06);
  border-radius: 999px;
  padding: 3px;
  position: relative;
}
.mode-toggle button {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  border-radius: 999px;
  color: var(--hosq-ink-2);
  position: relative; z-index: 1;
  transition: color .2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.mode-toggle button.is-active { color: var(--hosq-cream); }
.mode-toggle .glider {
  position: absolute; top: 3px; bottom: 3px;
  background: var(--hosq-dark);
  border-radius: 999px;
  transition: left .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
  z-index: 0;
}

.topbar-end { display: flex; align-items: center; gap: 12px; }
.cmdk {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--hosq-line-2);
  border-radius: 8px;
  font-size: 12px;
  color: var(--hosq-ink-2);
}
.kbd {
  font-size: 11px; font-weight: 500;
  padding: 1px 5px; border-radius: 4px;
  background: rgba(35,31,32,0.08);
}
.avatar {
  width: 28px; height: 28px;
  border-radius: 999px;
  background: var(--hosq-violet);
  color: white;
  font-weight: 700; font-size: 12px;
  display: inline-flex; align-items: center; justify-content: center;
}

/* ===== app shell ===== */
.shell {
  display: grid;
  grid-template-columns: var(--rail-w) minmax(0, 1fr) var(--right-w);
  min-height: calc(100vh - var(--topbar-h));
  transition: grid-template-columns .25s ease;
}
body.mode-scoring   { --right-w: 440px; }
body.outline-pinned { --rail-w: var(--rail-w-open); }

/* =================================================================
   LEFT — outline icon-rail (P1)
   collapsed = 56px (state indicator only) · hover or pin = 280px
   ================================================================= */
.outline {
  position: sticky; top: var(--topbar-h);
  align-self: start;
  height: calc(100vh - var(--topbar-h));
  overflow: visible;        /* let inner expand on hover */
  z-index: 10;
}
.outline-inner {
  position: relative;
  width: var(--rail-w);
  height: 100%;
  background: var(--hosq-cream);
  padding: 16px 8px 24px;
  overflow-y: auto;
  overflow-x: hidden;
  transition: width .22s ease, padding .22s ease;
  border-right: 1px solid transparent;
}
.outline:hover .outline-inner,
body.outline-pinned .outline-inner {
  width: var(--rail-w-open);
  padding: 16px 14px 24px;
  border-right-color: var(--hosq-line);
}

.rail-pin {
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  height: 28px;
  border-radius: 6px;
  margin-bottom: 6px;
  color: var(--hosq-ink-3);
  transition: color .12s, background .12s;
}
.rail-pin:hover { color: var(--hosq-dark); background: rgba(35,31,32,0.05); }
body.outline-pinned .rail-pin { color: var(--hosq-coral); }
.rail-pin .label-pin {
  display: none;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 8px;
}
.outline:hover .rail-pin .label-pin,
body.outline-pinned .rail-pin .label-pin { display: inline; }

.outline-list { display: flex; flex-direction: column; gap: 0; }

.outline-row {
  display: grid;
  grid-template-columns: 24px 1fr 14px;
  align-items: center;
  gap: 0;
  padding: 8px 6px;
  border-radius: 8px;
  text-align: left;
  width: 100%;
  transition: background .12s, gap .15s, padding .15s;
  color: var(--hosq-dark);
  position: relative;
}
.outline-row:hover { background: rgba(35,31,32,0.05); }
.outline-row.is-active { background: rgba(35,31,32,0.10); }

.outline-row .num {
  font-size: 10px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--hosq-ink-2);
  text-align: center;
  opacity: 0;
  transition: opacity .15s;
}
.outline-row .label {
  font-size: 13px;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0;
  transition: opacity .15s;
  padding-left: 10px;
}
.outline:hover .outline-row .num,
body.outline-pinned .outline-row .num,
.outline:hover .outline-row .label,
body.outline-pinned .outline-row .label { opacity: 1; }
.outline-row.is-active .label { font-weight: 500; }

.outline-row .state-cell {
  display: flex; align-items: center; justify-content: center;
  width: 14px; height: 14px;
  margin-left: auto;
}

/* writing-mode dots */
.dot-state { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.dot-state.full     { background: var(--hosq-dark); }
.dot-state.partial  { background: transparent; border: 2px solid var(--hosq-dark); }
.dot-state.empty    { background: transparent; border: 1.5px solid var(--hosq-line-2); }

/* scoring-mode bars */
.bar-state {
  width: 28px; height: 4px;
  border-radius: 999px;
  background: var(--hosq-line);
  overflow: hidden;
  flex-shrink: 0;
  opacity: 1;
  transition: width .2s;
}
.outline-row .state-cell .bar-state { width: 8px; height: 8px; border-radius: 999px; padding: 0; background: var(--hosq-line); }
.outline:hover .outline-row .state-cell .bar-state,
body.outline-pinned .outline-row .state-cell .bar-state { width: 28px; height: 4px; }
.outline-row .state-cell .bar-state .fill { display: block; height: 100%; border-radius: 999px; }

.outline-foot {
  margin-top: 18px;
  padding: 12px 6px 0;
  border-top: 1px solid var(--hosq-line);
  font-size: 11px;
  color: var(--hosq-ink-2);
  display: none;
}
.outline:hover .outline-foot,
body.outline-pinned .outline-foot { display: block; }
.outline-foot .progress-num {
  font-size: 18px; font-weight: 700;
  color: var(--hosq-dark);
  font-variant-numeric: tabular-nums;
  display: block;
  margin-bottom: 4px;
}
.outline-foot .progress-bar {
  height: 3px;
  background: var(--hosq-line);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 6px;
}
.outline-foot .progress-bar .fill {
  display: block; height: 100%; background: var(--hosq-dark);
  border-radius: 999px;
  transition: width .4s;
}

/* =================================================================
   CENTER — document (P1, P2: prose-led, no form chrome)
   ================================================================= */
.doc {
  padding: 56px 96px 160px;
  max-width: 880px;
  margin: 0 auto;
  width: 100%;
}
.doc-header { margin-bottom: 24px; }
.doc-eyebrow {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--hosq-ink-2);
}
.doc-eyebrow .pill {
  padding: 2px 10px;
  border-radius: 999px;
  background: var(--hosq-paper);
  color: var(--hosq-dark);
  font-weight: 600;
}
.doc-title {
  font-weight: 700;
  font-size: 46px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0 0 10px;
}
.doc-subtitle {
  font-size: 16px;
  color: var(--hosq-ink-2);
  margin: 0;
}

/* phase = editorial chapter break (P2: 96px air, no underline) */
.phase {
  margin-top: 96px;
  scroll-margin-top: 80px;
}
.phase:first-of-type { margin-top: 56px; }
.phase-head { margin-bottom: 18px; }
.phase-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--hosq-ink-2);
  margin-bottom: 8px;
}
.phase-eyebrow .auto-tag {
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--hosq-paper);
  color: var(--hosq-ink-2);
  font-weight: 500;
  letter-spacing: 0.04em;
}
.phase-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin: 0;
}

/* SPECIMEN line (P1): horizontal flow of inline/chip facts directly under phase title */
.specimen {
  margin: 14px 0 8px;
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 4px 12px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--hosq-dark);
}
.specimen .fact { position: relative; display: inline-flex; align-items: center; gap: 6px; }
.specimen .dot-sep { color: var(--hosq-ink-3); user-select: none; font-weight: 400; }
.specimen .inline-edit {
  outline: none;
  padding: 1px 4px;
  margin: -1px -4px;
  border-radius: 4px;
  transition: background .12s;
}
.specimen .inline-edit:hover { background: rgba(35,31,32,0.04); }
.specimen .inline-edit:focus { background: var(--hosq-paper); }
.specimen .inline-edit.muted { color: var(--hosq-ink-3); }
/* hover-tooltip with field label */
.specimen .fact[data-label]:hover::before {
  content: attr(data-label);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 0;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--hosq-ink-2);
  white-space: nowrap;
  background: var(--hosq-paper);
  padding: 2px 6px;
  border-radius: 4px;
  pointer-events: none;
  z-index: 5;
}

/* phase 18 (auto/meta) collapsed micro-footer style */
.phase.auto .specimen { font-size: 12px; color: var(--hosq-ink-2); }
.phase.auto .phase-title { font-size: 18px; color: var(--hosq-ink-2); font-weight: 500; }

/* PROSE BLOCK (P1, P2): pure paragraphs; label lives in caption that fades in on hover/focus */
.phase-body { margin-top: 8px; }
.prose-block {
  position: relative;
  padding-top: 24px;
  margin-bottom: 18px;
}
.prose-caption {
  position: absolute;
  top: 4px; left: 0; right: 0;
  display: flex; align-items: center; gap: 10px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--hosq-ink-2);
  opacity: 0.32;        /* always-visible-low-contrast (Tufte) */
  transition: opacity .15s;
  pointer-events: none;
}
.prose-block:hover .prose-caption,
.prose-block:focus-within .prose-caption { opacity: 1; pointer-events: auto; }
.prose-caption .req-dot {
  width: 5px; height: 5px;
  border-radius: 999px;
  background: var(--hosq-coral);
  display: inline-block;
  opacity: 0;
  transition: opacity .15s;
}
.prose-block.is-empty:focus-within .prose-caption .req-dot { opacity: 1; }
.prose-caption .metric-tag {
  display: inline-flex;
  padding: 1px 5px;
  border-radius: 4px;
  background: rgba(35,31,32,0.06);
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--hosq-ink-2);
  font-variant-numeric: tabular-nums;
}

.prose-block .editable.para {
  font-size: 16px;
  line-height: 1.7;
  margin: 0 0 10px;
  padding: 4px 6px;
  border-radius: 6px;
  outline: none;
  transition: background .12s, box-shadow .12s;
  cursor: text;
}
.prose-block .editable.para:last-child { margin-bottom: 0; }
.prose-block .editable.para:hover { background: rgba(35,31,32,0.025); }
.prose-block .editable.para:focus { background: var(--hosq-paper); box-shadow: inset 0 0 0 1px var(--hosq-line); }
.prose-block .editable.para.is-selected {
  background: rgba(255,111,85,0.08);
  box-shadow: inset 0 0 0 1px rgba(255,111,85,0.30);
}
.prose-block .editable.para.is-related {
  background: rgba(196,124,241,0.10);
  box-shadow: inset 0 0 0 1px rgba(196,124,241,0.28);
}

/* PLACEHOLDER (P2): italic in-flow prompt, not a dashed box */
.placeholder-prose {
  position: relative;
  font-style: italic;
  color: var(--hosq-ink-3);
  margin: 6px 0 18px;
  padding: 4px 6px 4px 18px;
  font-size: 15px;
  line-height: 1.65;
  cursor: text;
  border-radius: 6px;
  transition: color .12s, background .12s;
}
.placeholder-prose::before {
  content: "…";
  position: absolute;
  left: 4px;
  color: var(--hosq-ink-3);
  font-style: normal;
  font-weight: 600;
}
.placeholder-prose:hover { color: var(--hosq-ink-2); background: rgba(35,31,32,0.025); }
.placeholder-prose .ph-label {
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--hosq-ink-3);
  margin-right: 8px;
  font-weight: 600;
}

/* tag chip (kept) */
.chip {
  display: inline-flex; align-items: center;
  padding: 2px 9px;
  border-radius: 999px;
  background: var(--hosq-paper);
  font-size: 12px;
  font-weight: 500;
  line-height: 1.4;
}
.chip.coral  { background: rgba(255,111,85,0.16); color: #8a2e1c; }
.chip.green  { background: rgba(20,182,114,0.16); color: #0a6b41; }
.chip.violet { background: rgba(196,124,241,0.16); color: #6e2da7; }
.chip.blue   { background: rgba(86,164,203,0.18); color: #2c627c; }
.chip.dark   { background: var(--hosq-dark); color: var(--hosq-cream); }
.chip-row { display: inline-flex; flex-wrap: wrap; gap: 4px; }

/* =================================================================
   RIGHT — AI panel (P3: no left border, blends with cream)
   ================================================================= */
.ai {
  position: sticky; top: var(--topbar-h);
  align-self: start;
  height: calc(100vh - var(--topbar-h));
  overflow-y: auto;
  padding: 28px 28px 40px 32px;
  background: var(--hosq-cream);
  /* no border-left: rely on whitespace + paper cards */
}

.ai-eyebrow {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--hosq-ink-2);
  margin-bottom: 14px;
}
.ai-eyebrow .mode-pill {
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--hosq-dark);
  color: var(--hosq-cream);
}

.score-block {
  background: var(--hosq-paper);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 18px;
}
.score-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.score-num {
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.score-num .of { font-size: 16px; color: var(--hosq-ink-2); font-weight: 500; }
.score-delta {
  font-size: 12px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
}
.score-delta.up   { background: rgba(20,182,114,0.18); color: #0a6b41; }
.score-delta.down { background: rgba(216,85,63,0.16); color: #8a2e1c; }
.score-delta.flat { background: rgba(35,31,32,0.08); color: var(--hosq-ink-2); }

.score-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--hosq-ink-2);
  margin-bottom: 12px;
}
.score-meta .stale-dot {
  width: 7px; height: 7px; border-radius: 999px;
  background: var(--hosq-ink-3);
}
.score-meta.is-stale .stale-dot { background: var(--hosq-warn); }
.score-meta.is-stale strong { color: var(--hosq-dark); }

.score-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  padding: 11px 16px;
  background: var(--hosq-dark);
  color: var(--hosq-cream);
  border-radius: 999px;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.02em;
  transition: opacity .15s, transform .1s;
}
.score-btn:hover { opacity: 0.92; }
.score-btn:active { transform: translateY(1px); }
.score-btn[disabled] { opacity: 0.45; cursor: not-allowed; }
.score-btn.is-cooling {
  background: var(--hosq-paper);
  color: var(--hosq-ink-2);
  border: 1px dashed var(--hosq-line-2);
}
.score-btn .recommend { font-size: 11px; font-weight: 500; opacity: 0.75; }

/* writing weak-list */
.weak-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 18px; }
.weak-item {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 12px;
  text-align: left;
  width: 100%;
  transition: background .12s;
}
.weak-item:hover, .weak-item.is-active { background: var(--hosq-paper); }
.weak-item .vcode {
  font-size: 11px; font-weight: 700;
  color: var(--hosq-ink-2);

/* helpers ------------------------------------------------ */
function splitFields(phase) {
  const facts = [], prose = [];
  for (const f of phase.fields) {
    const v = f.value; if (!v) continue;
    if (v.kind === "inline" || v.kind === "chip" || v.kind === "chips") facts.push(f);
    else prose.push(f);
  }
  return { facts, prose };
}
function phaseFillState(phase) {
  let total = phase.fields.length, full = 0;
  for (const f of phase.fields) {
    const v = f.value; if (!v) continue;
    if (v.kind === "placeholder") continue;
    if (v.kind === "inline" && (!v.text || v.text === "")) continue;
    if (v.kind === "chips" && (!v.items || v.items.length === 0)) continue;
    full += 1;
  }
  if (full === total) return "full";
  if (full === 0) return "empty";
  return "partial";
}
function phaseScore(phase, app) {
  const codes = new Set();
  for (const f of phase.fields) {
    const v = f.value; if (!v) continue;
    if (v.kind === "para" && v.metrics) v.metrics.forEach(m => codes.add(m));
    if (v.kind === "paras") (v.paras || []).forEach(p => (p.metrics || []).forEach(m => codes.add(m)));
  }
  if (codes.size === 0) return null;
  let sum = 0, n = 0;
  for (const c of codes) if (app.subScores[c] != null) { sum += app.subScores[c]; n += 1; }
  return n ? Math.round(sum / n) : null;
}
function barColor(s) {
  if (s >= 80) return "var(--hosq-good)";
  if (s >= 70) return "var(--hosq-blue)";
  if (s >= 60) return "var(--hosq-warn)";
  return "var(--hosq-bad)";
}

const state = {
  mode: "writing",
  activeAppId: NOTATIONS.id,
  selectedParaEl: null,
  expandedVector: null,

};
function activeApp() { return APPS.find(a => a.id === state.activeAppId); }

/* tabs --------------------------------------------------- */
function renderTabs() {
  const root = document.getElementById("tabs");
  root.innerHTML = "";
  for (const app of APPS) {
    const isActive = app.id === state.activeAppId;
    const btn = document.createElement("button");
    btn.className = "tab" + (isActive ? " is-active" : "");
    if (app.isNew) {
      btn.innerHTML = `<span class="dot" style="background:transparent;border:1.5px dashed currentColor"></span><span>${app.title}</span>`;
    } else {
      btn.innerHTML = `<span class="dot"></span><span>${app.title}</span><span class="score-mini">${app.score}</span>`;
      const close = document.createElement("span");
      close.className = "tab-close"; close.textContent = "×"; close.title = "Close (mock)";
      close.onclick = (e) => { e.stopPropagation(); };
      btn.appendChild(close);
    }
    btn.onclick = () => { state.activeAppId = app.id; renderAll(); };
    root.appendChild(btn);
  }
  const add = document.createElement("button");
  add.className = "tab-add"; add.textContent = "+"; add.title = "New application";
  add.onclick = () => { state.activeAppId = NEW_APP.id; renderAll(); };
  root.appendChild(add);
}

/* mode toggle -------------------------------------------- */
function renderModeToggle() {
  const tg = document.getElementById("modeToggle");
  const buttons = tg.querySelectorAll("button");
  buttons.forEach(b => {
    b.classList.toggle("is-active", b.dataset.mode === state.mode);
    b.onclick = () => {
      if (state.mode === b.dataset.mode) return;
      state.mode = b.dataset.mode;
      document.body.classList.toggle("mode-writing", state.mode === "writing");
      document.body.classList.toggle("mode-scoring", state.mode === "scoring");
      state.expandedVector = null;
      state.selectedParaEl = null;
      state.highlightedMetrics.clear();
      renderAll();
      flashHint(state.mode === "writing" ? "Writing mode — click a paragraph for the coach." : "Scoring mode — click a vector to drill into 39 sub-indices.");
    };
  });
  positionGlider();
}
function positionGlider() {
  const tg = document.getElementById("modeToggle");
  const glider = document.getElementById("modeGlider");
  const active = tg.querySelector("button.is-active");
  if (!active || !glider) return;
  glider.style.left = active.offsetLeft + "px";
  glider.style.width = active.offsetWidth + "px";
}

/* shell -------------------------------------------------- */
function renderShell() {
  const shell = document.getElementById("shell");
  const app = activeApp();
  if (app.isNew) { shell.innerHTML = renderEmptyShell(); wireEmptyShell(); return; }
  const phases = notationsContent();
  shell.innerHTML = `
    ${renderOutline(phases, app)}
    <main class="doc">

      ${phases.map(p => renderPhase(p)).join("")}

    ${state.mode === "writing" ? renderWritingPanel(app) : renderScoringPanel(app)}

  wireOutline();
  wireDoc();
  wireScoreBtn(app);

  if (state.mode === "writing") renderCoachPanel();
}

/* outline (icon-rail) ------------------------------------ */
function renderOutline(phases, app) {
  const rows = phases.map(p => {
    const fs = phaseFillState(p);
    const score = phaseScore(p, app);
    const writingViz = `<span class="writing-only"><span class="dot-state ${fs}"></span></span>`;
    const scoringViz = `<span class="scoring-only">${score == null ? `<span class="bar-state"></span>` : `<span class="bar-state"><span class="fill" style="width:${score}%; background:${barColor(score)}"></span></span>`}</span>`;
    return `
      <button class="outline-row" data-phase="${p.n}">
        <span class="num">${String(p.n).padStart(2,"0")}</span>
        <span class="label">${escapeHtml(p.title)}</span>
        <span class="state-cell">${writingViz}${scoringViz}</span>
      </button>
    `;
  }).join("");

  return `
    <aside class="outline" id="outline">
      <div class="outline-inner">
        <button class="rail-pin" id="railPin" title="Pin outline open">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
          <span class="label-pin">Pin</span>
        </button>
        <div class="outline-list">${rows}</div>
        <div class="outline-foot">
          <span style="font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--hosq-ink-2)">Completion</span>
          <span class="progress-num">${app.completion}<span style="font-size:11px;color:var(--hosq-ink-2);font-weight:500"> / 100%</span></span>
          <div class="progress-bar"><span class="fill" style="width:${app.completion}%"></span></div>
        </div>
      </div>
    </aside>
  `;
}

function wireOutline() {
  document.querySelectorAll(".outline-row").forEach(row => {
    row.onclick = () => {
      const n = row.dataset.phase;
      const tgt = document.getElementById("phase-" + n);
      if (tgt) tgt.scrollIntoView({ behavior: "smooth", block: "start" });
      document.querySelectorAll(".outline-row").forEach(r => r.classList.remove("is-active"));
      row.classList.add("is-active");
    };
  });
  const pin = document.getElementById("railPin");
  if (pin) pin.onclick = () => {
    document.body.classList.toggle("outline-pinned");
    flashHint(document.body.classList.contains("outline-pinned") ? "Outline pinned." : "Outline auto-collapses on mouse out.");
  };
}

/* phase -------------------------------------------------- */
function renderPhase(p) {
  const { facts, prose } = splitFields(p);
  const specimen = facts.length ? renderSpecimen(facts) : "";
  const body = prose.length ? `<div class="phase-body">${prose.map(renderProseBlock).join("")}</div>` : "";
  return `
    <section class="phase ${p.auto ? "auto" : ""}" id="phase-${p.n}">
      <header class="phase-head">
        <span class="phase-eyebrow">Phase ${String(p.n).padStart(2,"0")}${p.auto ? ` <span class="auto-tag">auto</span>` : ""}</span>
        <h2 class="phase-title">${escapeHtml(p.title)}</h2>
      </header>
      ${specimen}
      ${body}
    </section>
  `;
}

function renderSpecimen(facts) {
  const parts = facts.map(f => {
    const v = f.value;
    let inner = "";
    if (v.kind === "inline") {
      const cls = v.muted ? "inline-edit muted" : "inline-edit";
      inner = `<span class="${cls}" contenteditable="true">${escapeHtml(v.text)}</span>`;
    } else if (v.kind === "chip") {
      inner = `<span class="chip ${v.variant || ""}">${escapeHtml(v.text)}</span>`;
    } else if (v.kind === "chips") {
      inner = `<span class="chip-row">${(v.items || []).map(([t, va]) => `<span class="chip ${va || ""}">${escapeHtml(t)}</span>`).join("")}</span>`;
    }
    return `<span class="fact" data-label="${escapeHtml(f.label)}">${inner}</span>`;
  });
  return `<div class="specimen">${parts.join('<span class="dot-sep">·</span>')}</div>`;
}

function renderProseBlock(field) {
  const v = field.value;
  if (v.kind === "placeholder") {
    return `<p class="placeholder-prose"><span class="ph-label">${escapeHtml(field.label)}</span>${escapeHtml(v.text)}</p>`;
  }
  const paras = v.kind === "paras" ? (v.paras || []) : [{ text: v.text, metrics: v.metrics }];
  const allMetrics = [...new Set(paras.flatMap(p => p.metrics || []))];
  const innerParas = paras.map(p => `<p class="editable para" contenteditable="true" data-metrics="${(p.metrics || []).join(",")}">${escapeHtml(p.text)}</p>`).join("");
  return `
    <div class="prose-block ${field.req ? "is-req" : ""}" data-label="${escapeHtml(field.label)}">
      <div class="prose-caption">
        <span class="prose-label">${escapeHtml(field.label)}</span>
        ${allMetrics.length ? allMetrics.map(m => `<span class="metric-tag">${m}</span>`).join("") : ""}
        ${field.req ? `<span class="req-dot" title="required"></span>` : ""}
      </div>
      ${innerParas}
    </div>
  `;
}

/* writing panel ------------------------------------------ */
function renderWritingPanel(app) {
  const stale = app.dirtySinceScore > 0;
  const weak = topWeakSpots(app, 3);
  return `
    <aside class="ai">
      <div class="ai-eyebrow">
        <span>AI · Quiet</span>
        <span class="mode-pill">writing</span>
      </div>
      <div class="score-block ${stale ? "is-stale" : ""}">
        <div class="score-row">
          <div class="score-num tabular">${app.score}<span class="of"> / 100</span></div>
          ${renderDelta(app)}
        </div>
        <div class="score-meta ${stale ? "is-stale" : ""}">
          <span class="stale-dot"></span>
          ${stale
            ? `<span><strong>${app.dirtySinceScore} edits</strong> since last score · ${app.lastScoreMinutesAgo} min ago</span>`
            : `<span>Up to date · ${app.lastScoreMinutesAgo} min ago</span>`}
        </div>
        <button class="score-btn ${app.dirtySinceScore < 5 ? "is-cooling" : ""}" id="scoreBtn">
          <span>${stale ? "Re-score" : "Score"}</span>
          ${app.dirtySinceScore < 5 && stale ? `<span class="recommend">· edits are minor</span>` : ""}
        </button>
      </div>

      <div class="ai-eyebrow"><span>Top weak spots</span></div>
      <div class="weak-list">
        ${weak.map(w => `
          <button class="weak-item" data-vector="${w.code}">
            <span class="vcode">${w.code}</span>
            <span class="vname">${escapeHtml(w.name)}<span class="sub">${w.subWeak ? `${w.subWeak[0]} · ${escapeHtml(w.subWeak[1])}` : ""}</span></span>
            <span class="vscore">${w.score}</span>
          </button>
        `).join("")}
      </div>
      <button class="see-all" id="seeAllBtn">See all 10 vectors →</button>

      <div class="coach" id="coach"></div>
    </aside>
  `;
}

function renderDelta(app) {
  const d = app.score - app.prevScore;
  if (d === 0) return `<span class="score-delta flat">— no change</span>`;
  if (d > 0)  return `<span class="score-delta up">▲ ${d}</span>`;
  return `<span class="score-delta down">▼ ${Math.abs(d)}</span>`;
}

function topWeakSpots(app, n = 3) {
  const sorted = VECTORS.map(v => {
    const subs = SUBINDICES[v.code] || [];
    const subWeak = subs.map(([code, name]) => [code, name, app.subScores[code] ?? 0])
      .sort((a, b) => a[2] - b[2])[0];
    return {
      code: v.code, name: v.name,
      score: app.vectorScores[v.code] ?? 0,
      subWeak: subWeak ? [subWeak[0], subWeak[1]] : null,
    };
  }).sort((a, b) => a.score - b.score);
  return sorted.slice(0, n);
}

function renderCoachPanel() {
  const c = document.getElementById("coach");
  if (!c) return;
  const para = state.selectedParaEl;
  if (!para) {
    c.innerHTML = `
      <div class="coach-head">Coach</div>
      <div class="coach-empty">
        <strong>Click any paragraph</strong> to ask the coach for suggestions. The coach reads only that paragraph — cheap and focused, doesn't trigger a full re-score.
      </div>
    `;
    return;
  }
  const metrics = (para.dataset.metrics || "").split(",").filter(Boolean);
  const phaseEl = para.closest(".phase");
  const phaseName = phaseEl ? phaseEl.querySelector(".phase-title").textContent : "—";
  const block = para.closest(".prose-block");
  const fieldName = block ? (block.dataset.label || "paragraph") : "paragraph";
  c.innerHTML = `
    <div class="coach-head">Coach · selected paragraph</div>
    <div class="coach-target">${escapeHtml(fieldName)}</div>
    <div class="coach-meta">in ${escapeHtml(phaseName)} · drives ${metrics.length} sub-index${metrics.length === 1 ? "" : "es"}</div>
    <div class="coach-tags">
      ${metrics.map(m => `<span class="metric-tag">${m}</span>`).join("") || `<span class="muted" style="font-size:12px">no scoring tie</span>`}
    </div>
    <button class="coach-cta">
      Suggest 3 improvements
      <span class="cost">· local, doesn't re-score</span>
    </button>
  `;
}

        </div>
        <button class="score-btn ${app.dirtySinceScore < 5 ? "is-cooling" : ""}" id="scoreBtn">
          <span>${stale ? "Re-score" : "Score"}</span>
          ${app.dirtySinceScore < 5 && stale ? `<span class="recommend">· edits are minor</span>` : ""}
        </button>
      </div>
      <div class="ai-eyebrow"><span>10 vectors</span><span class="muted" style="text-transform:none;letter-spacing:0">click to drill</span></div>
      <div class="vec-list ${stale ? "is-stale" : ""}">
        ${VECTORS.map(v => renderVecItem(v, app)).join("")}
      </div>
    </aside>
  `;
}

function renderVecItem(v, app) {
  const score = app.vectorScores[v.code] ?? 0;
  const cls = score >= 80 ? "good" : score >= 70 ? "ok" : score >= 60 ? "warn" : "bad";
  const expanded = state.expandedVector === v.code;
  const subs = SUBINDICES[v.code] || [];
  const subRows = subs.map(([code, name]) => {
    const s = app.subScores[code] ?? 0;
    const sCls = s >= 80 ? "good" : s >= 70 ? "ok" : s >= 60 ? "warn" : "bad";
    const isWorst = subs.map(([c]) => app.subScores[c] ?? 0).sort((a,b)=>a-b)[0] === s;
    return `
      <button class="sub-row" data-sub="${code}" style="text-align:left;width:100%;background:none;border:none;padding:5px 0;cursor:pointer">
        <span class="sub-code">${code}</span>
        <span class="sub-name">${escapeHtml(name)}${isWorst ? ' <span class="muted" style="font-size:10px">· weakest in vector</span>' : ""}</span>
        <span class="sub-score t-${sCls}">${s}</span>
      </button>
    `;
  }).join("");
  const narratives = subs.map(([code]) => app.subNarratives[code] ? { code, text: app.subNarratives[code] } : null).filter(Boolean);
  const narrativeBlock = narratives.length
    ? narratives.map(n => `<div class="sub-narrative"><strong style="color:var(--hosq-dark)">${n.code}:</strong> ${escapeHtml(n.text)} <a class="sub-jump" data-jump="${n.code}">↳ highlight in document</a></div>`).join("")
    : `<div class="sub-narrative muted">No specific weak-spot narrative for this vector. Open sub-indices above for detail.</div>`;
  return `
    <div class="vec-item ${expanded ? "is-expanded" : ""}" data-vec="${v.code}">
      <div class="vec-item-row" style="cursor:pointer" data-vec-toggle="${v.code}">
        <span class="vec-code">${v.code}</span>
        <span class="vec-name">${escapeHtml(v.name)}</span>
        <span class="vec-score">
          <span class="vec-score-bar"><span class="fill q-${cls}" style="width:${score}%"></span></span>
          <span class="num t-${cls}">${score}</span>
        </span>
      </div>
      <div class="subs">
        ${subRows}
        ${narrativeBlock}
      </div>
    </div>
  `;
}

/* doc wiring --------------------------------------------- */
function wireDoc() {
  document.querySelectorAll(".editable.para").forEach(p => {
    p.addEventListener("click", () => {
      document.querySelectorAll(".editable.para.is-selected").forEach(x => x.classList.remove("is-selected"));
      p.classList.add("is-selected");
      state.selectedParaEl = p;
      if (state.mode === "writing") renderCoachPanel();
    });
    p.addEventListener("input", onEdit);
  });
  document.querySelectorAll(".specimen .inline-edit").forEach(s => {
    s.addEventListener("input", onEdit);
  });
  document.querySelectorAll(".placeholder-prose").forEach(p => {
    p.addEventListener("click", () => { /* mock: would open inline editor */ flashHint("Click captured — would open inline editor in production."); });
  });
}
function onEdit() {
  const app = activeApp();
  app.dirtySinceScore = (app.dirtySinceScore || 0) + 1;
  patchStaleHeader(app);
}
function patchStaleHeader(app) {
  const meta = document.querySelector(".score-meta");
  if (!meta) return;
  meta.classList.add("is-stale");
  const span = meta.querySelector("span:last-child");
  if (span) span.innerHTML = `<strong>${app.dirtySinceScore} edits</strong> since last score · ${app.lastScoreMinutesAgo} min ago`;
  document.querySelector(".score-block")?.classList.add("is-stale");
  document.querySelector(".vec-list")?.classList.add("is-stale");
  const btn = document.getElementById("scoreBtn");
  if (btn) {
    btn.classList.toggle("is-cooling", app.dirtySinceScore < 5);
    btn.querySelector("span").textContent = "Re-score";
  }
}

/* score button ------------------------------------------- */
function wireScoreBtn(app) {
  const btn = document.getElementById("scoreBtn");
  if (!btn) return;
  btn.onclick = () => {
    if (app.dirtySinceScore === 0) { flashHint("Score is fresh — no edits since last run."); return; }
    if (app.dirtySinceScore < 5) {
      const ok = confirm("Recent score is still fresh and your edits are minor. Re-score anyway?\n\nScoring is computationally expensive — batching edits saves cost.");
      if (!ok) return;
    }
    runScore(app);
  };
  document.getElementById("seeAllBtn")?.addEventListener("click", () => {
    state.mode = "scoring";
    document.body.classList.add("mode-scoring");
    document.body.classList.remove("mode-writing");
    renderAll();
    flashHint("Switched to Scoring mode — all 10 vectors visible.");
  });
}
function runScore(app) {
  const drift = Math.round((Math.random() - 0.4) * 4);
  app.prevScore = app.score;
  app.score = Math.max(0, Math.min(100, app.score + drift));
  app.dirtySinceScore = 0;
  app.lastScoreMinutesAgo = 0;
  for (const v of VECTORS) {
    app.vectorScores[v.code] = Math.max(0, Math.min(100, (app.vectorScores[v.code] ?? 0) + Math.round((Math.random() - 0.4) * 3)));
  }
  flashHint("Re-scored. Cost charged.");
  renderAll();
}

/* scoring wiring ----------------------------------------- */
function wireScoringPanel(app) {
  document.querySelectorAll("[data-vec-toggle]").forEach(el => {
    el.onclick = () => {
      const v = el.dataset.vecToggle;
      state.expandedVector = state.expandedVector === v ? null : v;
      const sub = SUBINDICES[v] || [];
      state.highlightedMetrics = new Set(sub.map(([c]) => c));
      applyMetricHighlights();
      renderShell();
    };
  });
  document.querySelectorAll("[data-sub]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const code = el.dataset.sub;
      state.highlightedMetrics = new Set([code]);
      applyMetricHighlights();
      flashHint(`Highlighted paragraphs driving ${code}.`);
    };
  });
  document.querySelectorAll("[data-jump]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const code = el.dataset.jump;
      state.highlightedMetrics = new Set([code]);
      applyMetricHighlights();
      const first = document.querySelector(`.editable.para[data-metrics*="${code}"]`);
      if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
    };
  });
}
function applyMetricHighlights() {
  document.querySelectorAll(".editable.para").forEach(p => {
    const codes = (p.dataset.metrics || "").split(",").filter(Boolean);
    const hit = codes.some(c => state.highlightedMetrics.has(c));
    p.classList.toggle("is-related", hit);
  });
}

function wireEmptyShell() {
  document.getElementById("cancelNew")?.addEventListener("click", () => { state.activeAppId = NOTATIONS.id; renderAll(); });
  document.getElementById("parseNew")?.addEventListener("click", () => {
    flashHint("Parsing… (mock — opening sample application)");
    setTimeout(() => { state.activeAppId = NOTATIONS.id; renderAll(); }, 600);
  });
  const dz = document.getElementById("dropzone");
  if (dz) {
    ["dragenter","dragover"].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add("is-drag"); }));
    ["dragleave","drop"].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove("is-drag"); }));
    dz.addEventListener("drop", () => {
      flashHint("File received (mock — opening sample application)");
      setTimeout(() => { state.activeAppId = NOTATIONS.id; renderAll(); }, 600);
    });
  }
}

/* ⌘K stub ------------------------------------------------ */
function wireCmdK() {
  const overlay = document.getElementById("cmdkOverlay");
  const open = () => { overlay.classList.add("is-open"); overlay.querySelector("input").focus(); };
  const close = () => overlay.classList.remove("is-open");
  document.getElementById("cmdkBtn").addEventListener("click", open);
  overlay.addEventListener("click", close);
  document.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); open(); }
    if (e.key === "Escape") close();
  });
}

/* utils -------------------------------------------------- */
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
let hintTimer = null;
function flashHint(text) {
  const el = document.getElementById("hintStrip");
  el.textContent = text;
  el.classList.add("is-visible");
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => el.classList.remove("is-visible"), 2400);
}

/* boot --------------------------------------------------- */
function renderAll() { renderTabs(); renderModeToggle(); renderShell(); positionGlider(); }
window.addEventListener("load", () => {
  renderAll();
  wireCmdK();
  flashHint("Try the outline pin (top-left) and click any paragraph.");
});
window.addEventListener("resize", positionGlider);
</script>
