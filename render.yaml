services:
  - type: web
    runtime: static
    name: hosq-curator-workspace
    branch: main
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
